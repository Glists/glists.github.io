<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Glists</title>
    <style>
        /* ----- CSS переменные для тем ----- */
        :root {
            --bg-body: #f0f2f5;
            --bg-container: white;
            --text-primary: #1e2a3e;
            --text-secondary: #555;
            --border-color: #ddd;
            --post-bg: #f8f9fa;
            --like-btn: #1877f2;
            --like-btn-active: #e0245e;
        }
        body.dark {
            --bg-body: #1a1a2e;
            --bg-container: #16213e;
            --text-primary: #eee;
            --text-secondary: #aaa;
            --border-color: #2c3e50;
            --post-bg: #0f3460;
            --like-btn: #4a9eff;
            --like-btn-active: #ff4d6d;
        }
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg-body); margin: 0; padding: 20px; transition: background 0.2s; }
        .container { max-width: 600px; margin: auto; background: var(--bg-container); border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 20px; transition: background 0.2s; }
        h1 { font-size: 1.8rem; margin: 0 0 10px 0; color: #1877f2; display: flex; justify-content: space-between; align-items: center; }
        .top-bar { display: flex; gap: 10px; }
        .theme-toggle, .lang-toggle { background: #e4e6eb; border: none; border-radius: 20px; padding: 6px 12px; cursor: pointer; font-size: 0.9rem; }
        input, button { padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-container); color: var(--text-primary); }
        button { background: #1877f2; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0e5dc7; }
        .post { background: var(--post-bg); margin: 10px 0; padding: 10px; border-left: 4px solid #1877f2; border-radius: 8px; }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.8rem; color: var(--text-secondary); }
        .post-author { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .post-author a { color: var(--text-primary); text-decoration: none; font-weight: bold; }
        .post-author a:hover { text-decoration: underline; }
        .small-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #1877f2; display: inline-flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 1rem; }
        .delete-btn { background: #dc3545; color: white; border: none; border-radius: 20px; padding: 4px 12px; cursor: pointer; }
        .verified-icon { display: inline-flex; margin-left: 4px; vertical-align: middle; }
        .like-btn { background: none; border: none; cursor: pointer; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 20px; color: var(--like-btn); }
        .like-btn.liked { color: var(--like-btn-active); font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>🐛 Glists
        <div class="top-bar">
            <button class="theme-toggle" id="themeToggle">🌙 Тёмная</button>
            <button class="lang-toggle" id="langToggle">🌐 EN</button>
        </div>
    </h1>
    <div id="authContainer">
        <div><input id="loginEmail" placeholder="Почта"> <input id="loginPassword" type="password" placeholder="Пароль"> <button id="loginBtn">Вход</button></div>
        <div><input id="registerEmail" placeholder="Новая почта"> <input id="registerPassword" type="password" placeholder="Пароль"> <button id="registerBtn">Регистрация</button></div>
    </div>
    <div id="feedContainer" style="display:none">
        <div id="greeting">Привет, <span id="currentUser"></span> <button id="logoutBtn">Выйти</button></div>
        <div><input id="postInput" placeholder="Что нового?"> <button id="publishBtn">Опубликовать</button></div>
        <hr><h3 id="feedTitle">Лента</h3><div id="feedList"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, setDoc, getDocs, where, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCzqpQniq7LiwRZ_L_FKEsIXh6CfC76QHA",
        authDomain: "myfirstsocialnetwork-0.firebaseapp.com",
        projectId: "myfirstsocialnetwork-0",
        storageBucket: "myfirstsocialnetwork-0.firebasestorage.app",
        messagingSenderId: "557037045975",
        appId: "1:557037045975:web:dbcbd7ca0111a1494ac892"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // SVG верификации
    const verifiedSVG = `<svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path fill="rgb(0, 149, 246)" d="M8.248 2.87a2.198 2.198 0 0 1 3.504 0c.48.633 1.264.958 2.05.85a2.198 2.198 0 0 1 2.478 2.477 2.2 2.2 0 0 0 .85 2.051 2.198 2.198 0 0 1 0 3.504 2.2 2.2 0 0 0-.85 2.05 2.198 2.198 0 0 1-2.477 2.478 2.2 2.2 0 0 0-2.051.85 2.198 2.198 0 0 1-3.504 0 2.2 2.2 0 0 0-2.05-.85 2.198 2.198 0 0 1-2.478-2.477 2.2 2.2 0 0 0-.85-2.051 2.198 2.198 0 0 1 0-3.504c.633-.48.958-1.264.85-2.05A2.198 2.198 0 0 1 6.197 3.72a2.2 2.2 0 0 0 2.051-.85"></path><path fill="#fff" fill-rule="evenodd" d="M13.765 7.205a.75.75 0 0 1 .03 1.06l-4.25 4.5a.75.75 0 0 1-1.047.042l-2.25-2.025A.75.75 0 0 1 7.25 9.667l1.706 1.536 3.748-3.968a.75.75 0 0 1 1.06-.03z" clip-rule="evenodd"></path></svg>`;

    // Локализация
    const translations = {
        ru: { greeting: "Привет", feedTitle: "Лента:", placeholder: "Что нового?", login: "Вход", register: "Регистрация", logout: "Выйти", publish: "Опубликовать", like: "Нравится", delete: "Удалить" },
        en: { greeting: "Hello", feedTitle: "Feed:", placeholder: "What's new?", login: "Login", register: "Register", logout: "Logout", publish: "Publish", like: "Like", delete: "Delete" }
    };
    let currentLang = localStorage.getItem('glists_lang') || 'ru';
    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('glists_lang', lang);
        document.getElementById('langToggle').innerText = lang === 'ru' ? '🌐 EN' : '🌐 RU';
        if (auth.currentUser) updateUIText();
    }
    function updateUIText() {
        const t = translations[currentLang];
        if (t) {
            document.getElementById('greeting').innerHTML = `${t.greeting}, <span id="currentUser"></span> <button id="logoutBtn">${t.logout}</button>`;
            document.getElementById('feedTitle').innerText = t.feedTitle;
            postInput.placeholder = t.placeholder;
            loginBtn.innerText = t.login;
            registerBtn.innerText = t.register;
            publishBtn.innerText = t.publish;
        }
    }
    document.getElementById('langToggle').onclick = () => {
        currentLang = currentLang === 'ru' ? 'en' : 'ru';
        setLanguage(currentLang);
        if (auth.currentUser) updateUIText();
    };
    setLanguage(currentLang);

    // Тёмная тема
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('glists_theme') === 'dark') document.body.classList.add('dark');
    themeToggle.onclick = () => {
        document.body.classList.toggle('dark');
        localStorage.setItem('glists_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        themeToggle.innerText = document.body.classList.contains('dark') ? '☀️ Светлая' : '🌙 Тёмная';
    };
    themeToggle.innerText = document.body.classList.contains('dark') ? '☀️ Светлая' : '🌙 Тёмная';

    // DOM элементы
    const authDiv = document.getElementById('authContainer');
    const feedDiv = document.getElementById('feedContainer');
    const loginEmail = document.getElementById('loginEmail');
    const loginPass = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const regEmail = document.getElementById('registerEmail');
    const regPass = document.getElementById('registerPassword');
    const regBtn = document.getElementById('registerBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const postInput = document.getElementById('postInput');
    const publishBtn = document.getElementById('publishBtn');
    const feedList = document.getElementById('feedList');
    const currentUserSpan = document.getElementById('currentUser');

    // Кэш пользователей (uid -> данные)
    const userCache = new Map();
    async function getUserInfo(uid) {
        if (userCache.has(uid)) return userCache.get(uid);
        try {
            const q = query(collection(db, 'users'), where('uid', '==', uid));
            const snap = await getDocs(q);
            if (!snap.empty) {
                const docData = snap.docs[0].data();
                const info = {
                    username: snap.docs[0].id,
                    displayName: docData.displayName || snap.docs[0].id,
                    verified: docData.verified === true,
                    avatarUrl: docData.avatarUrl || ''
                };
                userCache.set(uid, info);
                return info;
            }
        } catch(e) { console.error(e); }
        return null;
    }

    // Лайк
    async function toggleLike(postId, userId) {
        const likeRef = doc(db, 'likes', `${postId}_${userId}`);
        const likeSnap = await getDoc(likeRef);
        if (likeSnap.exists()) {
            await deleteDoc(likeRef);
            await updateDoc(doc(db, 'posts', postId), { likesCount: increment(-1) });
        } else {
            await setDoc(likeRef, { postId, userId, createdAt: new Date() });
            await updateDoc(doc(db, 'posts', postId), { likesCount: increment(1) });
        }
    }

    // Вход
    loginBtn.onclick = () => signInWithEmailAndPassword(auth, loginEmail.value, loginPass.value).catch(e => alert(e.message));
    
    // Регистрация
    regBtn.onclick = async () => {
        const email = regEmail.value, pass = regPass.value;
        if (!email || !pass) return alert("Заполни поля");
        try {
            const cred = await createUserWithEmailAndPassword(auth, email, pass);
            const username = email.split('@')[0];
            const displayName = prompt("Введите ваше отображаемое имя:", username);
            await setDoc(doc(db, "users", username), {
                email: email,
                displayName: displayName || username,
                verified: false,
                bio: "Новый пользователь Glists",
                createdAt: new Date(),
                uid: cred.user.uid,
                avatarUrl: ''
            });
            alert("Готово!");
        } catch(e) { alert(e.message); }
    };
    
    logoutBtn.onclick = () => signOut(auth);
    
    // Публикация поста
    publishBtn.onclick = async () => {
        const text = postInput.value.trim();
        if (!text) return alert("Напиши пост");
        const user = auth.currentUser;
        if (!user) return alert("Войди");
        const info = await getUserInfo(user.uid);
        const authorUsername = info ? info.username : user.email.split('@')[0];
        const authorDisplayName = info ? info.displayName : authorUsername;
        const authorAvatar = info ? info.avatarUrl : '';
        await addDoc(collection(db, "posts"), {
            text,
            uid: user.uid,
            email: user.email,
            authorUsername,
            authorDisplayName,
            authorAvatar,
            createdAt: new Date(),
            likesCount: 0
        });
        postInput.value = "";
    };

    // Лента
    function subscribeToFeed() {
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        onSnapshot(q, async (snap) => {
            feedList.innerHTML = "";
            const currentUser = auth.currentUser;
            for (const docSnap of snap.docs) {
                const data = docSnap.data();
                const postId = docSnap.id;
                const date = data.createdAt ? new Date(data.createdAt.toDate()).toLocaleString() : "";
                const isOwner = currentUser && currentUser.uid === data.uid;
                
                // Лайкнут ли текущий пользователь
                let liked = false;
                if (currentUser) {
                    const likeRef = doc(db, 'likes', `${postId}_${currentUser.uid}`);
                    const likeSnap = await getDoc(likeRef);
                    liked = likeSnap.exists();
                }
                
                // Данные автора (из поста или из кэша)
                let displayName = data.authorDisplayName;
                let authorUsername = data.authorUsername;
                let avatarUrl = data.authorAvatar;
                let verified = false;
                
                if (!displayName || !authorUsername) {
                    const info = await getUserInfo(data.uid);
                    if (info) {
                        displayName = info.displayName;
                        authorUsername = info.username;
                        verified = info.verified;
                        avatarUrl = info.avatarUrl;
                    } else {
                        displayName = data.email.split('@')[0];
                        authorUsername = data.email.split('@')[0];
                    }
                } else {
                    const info = await getUserInfo(data.uid);
                    if (info) verified = info.verified;
                }
                
                // HTML аватарки (картинка или инициал)
                const avatarHtml = avatarUrl
                    ? `<img src="${escapeHtml(avatarUrl)}" class="small-avatar" style="width:32px;height:32px;border-radius:50%;object-fit:cover;">`
                    : `<div class="small-avatar" style="width:32px;height:32px;border-radius:50%;background:#1877f2;display:inline-flex;align-items:center;justify-content:center;color:white;">${displayName.charAt(0).toUpperCase()}</div>`;
                
                const div = document.createElement('div');
                div.className = 'post';
                div.innerHTML = `
                    <div class="post-header">
                        <div class="post-author">
                            ${avatarHtml}
                            <a href="/profile.html?user=${escapeHtml(authorUsername)}">${escapeHtml(displayName)}</a>
                            ${verified ? `<span class="verified-icon">${verifiedSVG}</span>` : ''}
                        </div>
                        <span class="post-date">${date}</span>
                    </div>
                    <div class="post-text">${escapeHtml(data.text)}</div>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <button class="like-btn ${liked ? 'liked' : ''}" data-postid="${postId}">❤️ ${data.likesCount || 0}</button>
                        ${isOwner ? `<button class="delete-btn" data-id="${postId}">${translations[currentLang].delete}</button>` : ''}
                    </div>
                `;
                feedList.appendChild(div);
                
                const likeBtn = div.querySelector('.like-btn');
                if (likeBtn && currentUser) likeBtn.onclick = () => toggleLike(postId, currentUser.uid);
                if (isOwner) div.querySelector('.delete-btn').onclick = () => deleteDoc(doc(db, "posts", postId));
            }
        });
    }

    function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => m == '&' ? '&amp;' : m == '<' ? '&lt;' : '&gt;') : ''; }

    onAuthStateChanged(auth, user => {
        if (user) {
            authDiv.style.display = 'none';
            feedDiv.style.display = 'block';
            currentUserSpan.innerText = user.email;
            updateUIText();
            subscribeToFeed();
        } else {
            authDiv.style.display = 'flex';
            feedDiv.style.display = 'none';
            feedList.innerHTML = "";
        }
    });
</script>
</body>
</html>
