<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Glists</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCzqpQniq7LiwRZ_L_FKEsIXh6CfC76QHA",
            authDomain: "myfirstsocialnetwork-0.firebaseapp.com",
            projectId: "myfirstsocialnetwork-0",
            storageBucket: "myfirstsocialnetwork-0.firebasestorage.app",
            messagingSenderId: "557037045975",
            appId: "1:557037045975:web:dbcbd7ca0111a1494ac892"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const authDiv = document.getElementById('authContainer');
        const feedDiv = document.getElementById('feedContainer');
        const loginEmail = document.getElementById('loginEmail');
        const loginPass = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');
        const regEmail = document.getElementById('registerEmail');
        const regPass = document.getElementById('registerPassword');
        const regBtn = document.getElementById('registerBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const postInput = document.getElementById('postInput');
        const publishBtn = document.getElementById('publishBtn');
        const feedList = document.getElementById('feedList');
        const currentUserSpan = document.getElementById('currentUser');

        loginBtn.onclick = () => signInWithEmailAndPassword(auth, loginEmail.value, loginPass.value).catch(e => alert(e.message));
        regBtn.onclick = async () => {
            const email = regEmail.value, pass = regPass.value;
            if (!email || !pass) return alert("Заполни поля");
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                const username = email.split('@')[0];
                await setDoc(doc(db, "users", username), {
                    email: email,
                    displayName: username,
                    verified: false,
                    bio: "Новый пользователь Glists",
                    createdAt: new Date(),
                    uid: cred.user.uid
                });
                alert("Готово!");
            } catch(e) { alert(e.message); }
        };
        logoutBtn.onclick = () => signOut(auth);
        publishBtn.onclick = async () => {
            const text = postInput.value.trim();
            if (!text) return alert("Напиши пост");
            const user = auth.currentUser;
            if (!user) return alert("Войди");
            await addDoc(collection(db, "posts"), { text, uid: user.uid, email: user.email, createdAt: new Date() });
            postInput.value = "";
        };
        function subscribeToFeed() {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snap) => {
                feedList.innerHTML = "";
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    const date = data.createdAt ? new Date(data.createdAt.toDate()).toLocaleString() : "";
                    const isOwner = auth.currentUser && auth.currentUser.uid === data.uid;
                    const username = data.email.split('@')[0];
                    const div = document.createElement('div');
                    div.className = 'post';
                    div.innerHTML = `
                        <div><a href="/profile.html?user=${escapeHtml(username)}">${escapeHtml(data.email)}</a> <span style="font-size:0.8rem">${date}</span></div>
                        <div>${escapeHtml(data.text)}</div>
                        ${isOwner ? `<button class="delete-btn" data-id="${docSnap.id}">Удалить</button>` : ''}
                    `;
                    feedList.appendChild(div);
                    if (isOwner) div.querySelector('.delete-btn').onclick = () => deleteDoc(doc(db, "posts", docSnap.id));
                });
            });
        }
        function escapeHtml(s) { return s.replace(/[&<>]/g, m => m == '&' ? '&amp;' : m == '<' ? '&lt;' : '&gt;'); }
        onAuthStateChanged(auth, user => {
            if (user) {
                authDiv.style.display = 'none';
                feedDiv.style.display = 'block';
                currentUserSpan.innerText = user.email;
                subscribeToFeed();
            } else {
                authDiv.style.display = 'flex';
                feedDiv.style.display = 'none';
                feedList.innerHTML = "";
            }
        });
    </script>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 16px; padding: 20px; }
        input, button { padding: 10px; margin: 5px; }
        .post { background: #f8f9fa; margin: 10px 0; padding: 10px; border-left: 4px solid #1877f2; }
        .delete-btn { background: #dc3545; color: white; border: none; border-radius: 20px; padding: 4px 12px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h1>🐛 Glists</h1>
    <div id="authContainer">
        <div><input id="loginEmail" placeholder="Почта"> <input id="loginPassword" type="password" placeholder="Пароль"> <button id="loginBtn">Вход</button></div>
        <div><input id="registerEmail" placeholder="Новая почта"> <input id="registerPassword" type="password" placeholder="Пароль"> <button id="registerBtn">Регистрация</button></div>
    </div>
    <div id="feedContainer" style="display:none">
        <div>Привет, <span id="currentUser"></span> <button id="logoutBtn">Выйти</button></div>
        <div><input id="postInput" placeholder="Что нового?"> <button id="publishBtn">Опубликовать</button></div>
        <hr><h3>Лента</h3><div id="feedList"></div>
    </div>
</div>
</body>
</html>
