<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Glists</title>
    <style>
        /* ----- CSS переменные для тем ----- */
        :root {
            --bg-body: #f0f2f5;
            --bg-container: white;
            --text-primary: #1e2a3e;
            --text-secondary: #555;
            --border-color: #ddd;
            --post-bg: #f8f9fa;
            --like-btn: #1877f2;
            --like-btn-active: #e0245e;
        }
        body.dark {
            --bg-body: #1a1a2e;
            --bg-container: #16213e;
            --text-primary: #eee;
            --text-secondary: #aaa;
            --border-color: #2c3e50;
            --post-bg: #0f3460;
            --like-btn: #4a9eff;
            --like-btn-active: #ff4d6d;
        }
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg-body); margin: 0; padding: 20px; transition: background 0.2s; }
        .container { max-width: 600px; margin: 0 auto; background: var(--bg-container); border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 20px; transition: background 0.2s; }
        h1 { font-size: 1.8rem; margin: 0 0 10px 0; color: #1877f2; display: flex; align-items: center; gap: 10px; justify-content: space-between; }
        .top-bar { display: flex; gap: 10px; align-items: center; }
        .theme-toggle, .lang-toggle { background: #e4e6eb; border: none; border-radius: 20px; padding: 6px 12px; cursor: pointer; font-size: 1rem; }
        .auth-box { display: flex; flex-direction: column; gap: 15px; }
        .auth-row { display: flex; gap: 10px; flex-wrap: wrap; border-top: 1px solid var(--border-color); padding-top: 15px; }
        .auth-row:first-child { border-top: none; padding-top: 0; }
        input, button { padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 1rem; background: var(--bg-container); color: var(--text-primary); }
        input { flex: 1; }
        button { background: #1877f2; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0e5dc7; }
        .logout-btn { background: #e4e6eb; color: black; margin-bottom: 15px; }
        .post-form { display: flex; gap: 10px; margin: 20px 0; }
        .post-form input { flex: 1; }
        .post { background: var(--post-bg); border-radius: 12px; padding: 12px; margin-bottom: 12px; border-left: 4px solid #1877f2; }
        .post-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; }
        .post-email { display: flex; align-items: center; gap: 5px; }
        .verified-icon { display: inline-flex; margin-left: 4px; vertical-align: middle; }
        .post-text { font-size: 1rem; word-wrap: break-word; margin-bottom: 8px; color: var(--text-primary); }
        .post-actions { display: flex; gap: 15px; margin-top: 8px; }
        .like-btn { background: none; border: none; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; padding: 4px 8px; border-radius: 20px; transition: 0.1s; color: var(--like-btn); }
        .like-btn.liked { color: var(--like-btn-active); font-weight: bold; }
        .delete-btn { background: #dc3545; color: white; border: none; border-radius: 20px; padding: 5px 12px; font-size: 0.75rem; cursor: pointer; }
        .feed-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        hr { margin: 15px 0; border-color: var(--border-color); }
    </style>
</head>
<body>
<div class="container">
    <h1>🐛 Glists <div class="top-bar"><button class="theme-toggle" id="themeToggle">🌙 Тёмная</button><button class="lang-toggle" id="langToggle">🌐 EN</button></div></h1>
    
    <div id="authContainer" class="auth-box">
        <div class="auth-row">
            <input type="email" id="loginEmail" placeholder="Почта">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button id="loginBtn">Вход</button>
        </div>
        <div class="auth-row">
            <input type="email" id="registerEmail" placeholder="Новая почта">
            <input type="password" id="registerPassword" placeholder="Новый пароль">
            <button id="registerBtn">Регистрация</button>
        </div>
    </div>

    <div id="feedContainer" style="display: none;">
        <div class="feed-header">
            <span id="greeting">Привет, <span id="currentUser"></span>!</span>
            <button id="logoutBtn" class="logout-btn">🚪 Выйти</button>
        </div>
        <div class="post-form">
            <input type="text" id="postInput" placeholder="Что нового, Glists?">
            <button id="publishBtn">Опубликовать</button>
        </div>
        <hr>
        <h3 id="feedTitle">Лента:</h3>
        <div id="feedList"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCzqpQniq7LiwRZ_L_FKEsIXh6CfC76QHA",
        authDomain: "myfirstsocialnetwork-0.firebaseapp.com",
        projectId: "myfirstsocialnetwork-0",
        storageBucket: "myfirstsocialnetwork-0.firebasestorage.app",
        messagingSenderId: "557037045975",
        appId: "1:557037045975:web:dbcbd7ca0111a1494ac892"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // DOM
    const authContainer = document.getElementById('authContainer');
    const feedContainer = document.getElementById('feedContainer');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const registerEmail = document.getElementById('registerEmail');
    const registerPassword = document.getElementById('registerPassword');
    const registerBtn = document.getElementById('registerBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const postInput = document.getElementById('postInput');
    const publishBtn = document.getElementById('publishBtn');
    const feedList = document.getElementById('feedList');
    const currentUserSpan = document.getElementById('currentUser');

    // Локализация
    const translations = {
        ru: { greeting: "Привет", feedTitle: "Лента:", placeholder: "Что нового, Glists?", login: "Вход", register: "Регистрация", logout: "Выйти", publish: "Опубликовать", like: "Нравится", delete: "Удалить" },
        en: { greeting: "Hello", feedTitle: "Feed:", placeholder: "What's new, Glists?", login: "Login", register: "Register", logout: "Logout", publish: "Publish", like: "Like", delete: "Delete" }
    };
    let currentLang = localStorage.getItem('glists_lang') || 'ru';
    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('glists_lang', lang);
        document.getElementById('langToggle').innerText = lang === 'ru' ? '🌐 EN' : '🌐 RU';
        if (auth.currentUser) updateUIText();
    }
    function updateUIText() {
        const t = translations[currentLang];
        if (t) {
            document.getElementById('greeting').innerText = `${t.greeting}, ${auth.currentUser?.email || ''}!`;
            document.getElementById('feedTitle').innerText = t.feedTitle;
            postInput.placeholder = t.placeholder;
            loginBtn.innerText = t.login;
            registerBtn.innerText = t.register;
            logoutBtn.innerText = t.logout;
            publishBtn.innerText = t.publish;
        }
    }
    document.getElementById('langToggle').onclick = () => {
        currentLang = currentLang === 'ru' ? 'en' : 'ru';
        setLanguage(currentLang);
        if (auth.currentUser) updateUIText();
    };
    setLanguage(currentLang);

    // Тёмная тема
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('glists_theme') === 'dark') document.body.classList.add('dark');
    themeToggle.onclick = () => {
        document.body.classList.toggle('dark');
        localStorage.setItem('glists_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        themeToggle.innerText = document.body.classList.contains('dark') ? '☀️ Светлая' : '🌙 Тёмная';
    };
    if (document.body.classList.contains('dark')) themeToggle.innerText = '☀️ Светлая';
    else themeToggle.innerText = '🌙 Тёмная';

    // Синяя галочка — проверка по email (админ)
    function isVerified(email) {
        return email === 'admin@glists.com';
    }

    // Лайки
    async function toggleLike(postId, userId) {
        const likeRef = doc(db, 'likes', `${postId}_${userId}`);
        const likeSnap = await getDoc(likeRef);
        if (likeSnap.exists()) {
            await deleteDoc(likeRef);
            await updateDoc(doc(db, 'posts', postId), { likesCount: increment(-1) });
        } else {
            await setDoc(likeRef, { postId, userId, createdAt: new Date() });
            await updateDoc(doc(db, 'posts', postId), { likesCount: increment(1) });
        }
    }

    // Регистрация/вход/выход (как было)
    loginBtn.onclick = () => signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value).catch(err => alert("Ошибка: " + err.message));
    registerBtn.onclick = () => createUserWithEmailAndPassword(auth, registerEmail.value, registerPassword.value).then(() => alert("Регистрация успешна!")).catch(err => alert("Ошибка: " + err.message));
    logoutBtn.onclick = () => signOut(auth);
    publishBtn.onclick = async () => {
        const text = postInput.value.trim();
        if (!text) return alert("Напишите пост");
        const user = auth.currentUser;
        if (!user) return alert("Не авторизован");
        await addDoc(collection(db, "posts"), {
            text: text,
            uid: user.uid,
            email: user.email,
            createdAt: new Date(),
            likesCount: 0
        });
        postInput.value = "";
    };

    function subscribeToFeed() {
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        onSnapshot(q, async (snapshot) => {
            feedList.innerHTML = "";
            const currentUser = auth.currentUser;
            for (const docSnap of snapshot.docs) {
                const data = docSnap.data();
                const postId = docSnap.id;
                const date = data.createdAt ? new Date(data.createdAt.toDate()).toLocaleString() : "только что";
                const isOwner = currentUser && currentUser.uid === data.uid;
                // Проверка, лайкнул ли текущий пользователь
                let liked = false;
                if (currentUser) {
                    const likeRef = doc(db, 'likes', `${postId}_${currentUser.uid}`);
                    const likeSnap = await getDoc(likeRef);
                    liked = likeSnap.exists();
                }
                const postDiv = document.createElement('div');
                postDiv.className = 'post';
                postDiv.innerHTML = `
                    <div class="post-header">
                        <div class="post-email">
                            <strong>${escapeHtml(data.email)}</strong>
                            ${isVerified(data.email) ? `<span class="verified-icon"><svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path fill="rgb(0, 149, 246)" d="M8.248 2.87a2.198 2.198 0 0 1 3.504 0c.48.633 1.264.958 2.05.85a2.198 2.198 0 0 1 2.478 2.477 2.2 2.2 0 0 0 .85 2.051 2.198 2.198 0 0 1 0 3.504 2.2 2.2 0 0 0-.85 2.05 2.198 2.198 0 0 1-2.477 2.478 2.2 2.2 0 0 0-2.051.85 2.198 2.198 0 0 1-3.504 0 2.2 2.2 0 0 0-2.05-.85 2.198 2.198 0 0 1-2.478-2.477 2.2 2.2 0 0 0-.85-2.051 2.198 2.198 0 0 1 0-3.504c.633-.48.958-1.264.85-2.05A2.198 2.198 0 0 1 6.197 3.72a2.2 2.2 0 0 0 2.051-.85"></path><path fill="#fff" fill-rule="evenodd" d="M13.765 7.205a.75.75 0 0 1 .03 1.06l-4.25 4.5a.75.75 0 0 1-1.047.042l-2.25-2.025A.75.75 0 0 1 7.25 9.667l1.706 1.536 3.748-3.968a.75.75 0 0 1 1.06-.03z"></path></svg></span>` : ''}
                        </div>
                        <span class="post-date">${date}</span>
                    </div>
                    <div class="post-text">${escapeHtml(data.text)}</div>
                    <div class="post-actions">
                        <button class="like-btn ${liked ? 'liked' : ''}" data-postid="${postId}">❤️ ${data.likesCount || 0} ${translations[currentLang].like}</button>
                        ${isOwner ? `<button class="delete-btn" data-id="${postId}">🗑 ${translations[currentLang].delete}</button>` : ''}
                    </div>
                `;
                feedList.appendChild(postDiv);
                const likeButton = postDiv.querySelector('.like-btn');
                if (likeButton && currentUser) {
                    likeButton.onclick = (e) => {
                        e.preventDefault();
                        toggleLike(postId, currentUser.uid);
                    };
                }
                if (isOwner) {
                    const delBtn = postDiv.querySelector('.delete-btn');
                    delBtn.onclick = () => deleteDoc(doc(db, "posts", postId));
                }
            }
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            authContainer.style.display = 'none';
            feedContainer.style.display = 'block';
            currentUserSpan.innerText = user.email;
            updateUIText();
            subscribeToFeed();
        } else {
            authContainer.style.display = 'flex';
            feedContainer.style.display = 'none';
            feedList.innerHTML = "";
        }
    });
</script>
</body>
</html>
