<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Glists</title>
    <style>
        :root { --bg-body: #f0f2f5; --bg-container: white; --text-primary: #1e2a3e; --text-secondary: #555; --border-color: #ddd; --post-bg: #f8f9fa; --comment-bg: #f1f3f5; --like-btn: #1877f2; --like-btn-active: #e0245e; --dislike-btn: #6c757d; --dislike-btn-active: #dc3545; --poll-bg: #e9ecef; }
        body.dark { --bg-body: #1a1a2e; --bg-container: #16213e; --text-primary: #eee; --text-secondary: #aaa; --border-color: #2c3e50; --post-bg: #0f3460; --comment-bg: #1a2a4a; --like-btn: #4a9eff; --like-btn-active: #ff4d6d; --dislike-btn: #8c8f9e; --dislike-btn-active: #ff6b6b; --poll-bg: #0a1a2a; }
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: var(--bg-body); margin: 0; padding: 20px; transition: 0.2s; color: var(--text-primary); }
        .container { max-width: 600px; margin: auto; background: var(--bg-container); border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #1877f2; display: flex; justify-content: space-between; align-items: center; }
        .top-bar { display: flex; gap: 8px; }
        input, button, textarea { padding: 8px; margin: 4px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-container); color: var(--text-primary); }
        button { background: #1877f2; color: white; border: none; cursor: pointer; font-weight: bold; }
        .post { background: var(--post-bg); margin: 15px 0; padding: 15px; border-radius: 12px; border-left: 4px solid #1877f2; }
        .post-header { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 10px; }
        .small-avatar { width: 35px; height: 35px; border-radius: 50%; background: #1877f2; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .post-image { max-width: 100%; border-radius: 8px; margin: 10px 0; }
        .comment { background: var(--comment-bg); padding: 8px; border-radius: 8px; margin: 5px 0; font-size: 0.9rem; }
        .poll-option { background: var(--poll-bg); padding: 5px; margin: 5px 0; border-radius: 5px; display: flex; justify-content: space-between; cursor: pointer; }
        .repost-badge { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🐛 Glists
        <div class="top-bar">
            <button id="themeToggle">🌙</button>
            <button id="langToggle">🇷🇺 RU</button>
        </div>
    </h1>

    <div id="authContainer">
        <h3>Вход / Регистрация</h3>
        <input id="authEmail" placeholder="Email">
        <input id="authPass" type="password" placeholder="Пароль">
        <button id="loginBtn">Вход</button>
        <button id="regBtn">Регистрация</button>
    </div>

    <div id="feedContainer" style="display:none">
        <div id="greetingBar" style="margin-bottom: 20px;"></div>
        <div id="postForm">
            <textarea id="postInput" style="width:100%" placeholder="Чё как, братка?"></textarea>
            <input type="file" id="postImageInput" accept="image/*">
            <button id="publishBtn">Запостить</button>
        </div>
        <hr>
        <div id="feedList"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, increment, deleteDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCzqpQniq7LiwRZ_L_FKEsIXh6CfC76QHA",
        authDomain: "myfirstsocialnetwork-0.firebaseapp.com",
        projectId: "myfirstsocialnetwork-0",
        storageBucket: "myfirstsocialnetwork-0.firebasestorage.app",
        messagingSenderId: "557037045975",
        appId: "1:557037045975:web:dbcbd7ca0111a1494ac892"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const CLOUD_NAME = "dbmiuq6s7";
    const UPLOAD_PRESET = "glists_preset";

    // --- ВСПОМОГАТЕЛЬНОЕ ---
    const escape = (s) => s?.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

    // --- AUTH ---
    document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, authEmail.value, authPass.value).catch(e => alert(e.message));
    document.getElementById('regBtn').onclick = () => createUserWithEmailAndPassword(auth, authEmail.value, authPass.value).catch(e => alert(e.message));

    onAuthStateChanged(auth, (user) => {
        if (user) {
            authContainer.style.display = 'none';
            feedContainer.style.display = 'block';
            greetingBar.innerHTML = `Здарова, <b>${user.email}</b> <button onclick="window.logout()">Выход</button>`;
            loadFeed();
        } else {
            authContainer.style.display = 'block';
            feedContainer.style.display = 'none';
        }
    });
    window.logout = () => signOut(auth);

    // --- РЕАКЦИИ И ДЕЙСТВИЯ ---
    window.doLike = async (id) => {
        const ref = doc(db, "posts", id);
        await updateDoc(ref, { likesCount: increment(1) });
    };

    window.doRepost = async (id, text, author) => {
        await addDoc(collection(db, "posts"), {
            text: `[Репост от ${author}]: ${text}`,
            uid: auth.currentUser.uid,
            email: auth.currentUser.email,
            createdAt: new Date(),
            likesCount: 0,
            isRepost: true
        });
    };

    window.addComment = async (id) => {
        const val = document.getElementById(`cmnt-in-${id}`).value;
        if(!val) return;
        await addDoc(collection(db, "comments"), {
            postId: id,
            text: val,
            author: auth.currentUser.email,
            createdAt: new Date()
        });
        document.getElementById(`cmnt-in-${id}`).value = '';
    };

    // --- КАРТИНКИ ---
    async function uploadImg(file) {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', UPLOAD_PRESET);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
        const d = await res.json();
        return d.secure_url;
    }

    // --- ПОСТИНГ ---
    publishBtn.onclick = async () => {
        let url = null;
        if(postImageInput.files[0]) url = await uploadImg(postImageInput.files[0]);
        await addDoc(collection(db, "posts"), {
            text: postInput.value,
            uid: auth.currentUser.uid,
            email: auth.currentUser.email,
            createdAt: new Date(),
            likesCount: 0,
            imageUrl: url
        });
        postInput.value = '';
    };

    // --- ЛЕНТА ---
    function loadFeed() {
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snap) => {
            feedList.innerHTML = '';
            snap.forEach(d => {
                const p = d.data();
                const id = d.id;
                const div = document.createElement('div');
                div.className = 'post';
                div.innerHTML = `
                    <div class="post-header">
                        <div style="display:flex; gap:10px; align-items:center;">
                            <div class="small-avatar">${p.email[0].toUpperCase()}</div>
                            <b>${escape(p.email)}</b>
                        </div>
                        <span>${p.createdAt?.toDate().toLocaleString() || ''}</span>
                    </div>
                    <div class="post-text">${escape(p.text)}</div>
                    ${p.imageUrl ? `<img src="${p.imageUrl}" class="post-image">` : ''}
                    <div style="margin-top:10px;">
                        <button onclick="doLike('${id}')">❤️ ${p.likesCount || 0}</button>
                        <button onclick="doRepost('${id}', '${escape(p.text)}', '${escape(p.email)}')">🔁 Репост</button>
                        ${auth.currentUser.uid === p.uid ? `<button style="background:#dc3545" onclick="deleteDoc(doc(db,'posts','${id}'))">🗑️</button>` : ''}
                    </div>
                    <div id="cmnts-${id}" style="margin-top:10px; border-top:1px solid #eee; padding-top:10px;"></div>
                    <div style="display:flex; margin-top:5px;">
                        <input id="cmnt-in-${id}" style="flex:1" placeholder="Коммент...">
                        <button onclick="addComment('${id}')">📡</button>
                    </div>
                `;
                feedList.appendChild(div);
                
                // Грузим комменты для поста
                const cq = query(collection(db, "comments"), where("postId", "==", id), orderBy("createdAt", "asc"));
                onSnapshot(cq, (csnap) => {
                    const clist = document.getElementById(`cmnts-${id}`);
                    if(!clist) return;
                    clist.innerHTML = '';
                    csnap.forEach(cd => {
                        const c = cd.data();
                        clist.innerHTML += `<div class="comment"><b>${c.author.split('@')[0]}:</b> ${escape(c.text)}</div>`;
                    });
                });
            });
        });
    }

    // Тема
    themeToggle.onclick = () => {
        document.body.classList.toggle('dark');
        themeToggle.innerText = document.body.classList.contains('dark') ? '☀️' : '🌙';
    };
</script>
</body>
</html>
