    <style>
        :root {

            --bg-container: #16213e;
            --text-primary: #eee;
            --text-secondary: #aaa;
            --border-color: #2c3e50;
            --post-bg: #0f3460;
            --comment-bg: #1a2a4a;

        .container { max-width: 600px; margin: auto; background: var(--bg-container); border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 20px; transition: background 0.2s; }

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, setDoc, getDocs, where, updateDoc, increment, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

	const firebaseConfig = {
		apiKey: "AIzaSyB_NKxMxFLg3gjgJqqJq_GsgAvvtz86mXA",
		authDomain: "myfirstsocialnetwork-1.firebaseapp.com",
		projectId: "myfirstsocialnetwork-1",
		storageBucket: "myfirstsocialnetwork-1.firebasestorage.app",
		messagingSenderId: "327472461874",
		appId: "1:327472461874:web:47729cf4fc8c732484e42b",
		measurementId: "G-K825X42BYP"
	};
	const app = initializeApp(firebaseConfig);  // ← исправлено
	const db = getFirestore(app);
	const auth = getAuth(app);

    const verifiedSVG = `<svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path fill="rgb(0, 149, 246)" d="M8.248 2.87a2.198 2.198 0 0 1 3.504 0c.48.633 1.264.958 2.05.85a2.198 2.198 0 0 1 2.478 2.477 2.2 2.2 0 0 0 .85 2.051 2.198 2.198 0 0 1 0 3.504 2.2 2.2 0 0 0-.85 2.05 2.198 2.198 0 0 1-2.477 2.478 2.2 2.2 0 0 0-2.051.85 2.198 2.198 0 0 1-3.504 0 2.2 2.2 0 0 0-2.05-.85 2.198 2.198 0 0 1-2.478-2.477 2.2 2.2 0 0 0-.85-2.051 2.198 2.198 0 0 1 0-3.504c.633-.48.958-1.264.85-2.05A2.198 2.198 0 0 1 6.197 3.72a2.2 2.2 0 0 0 2.051-.85"></path><path fill="#fff" fill-rule="evenodd" d="M13.765 7.205a.75.75 0 0 1 .03 1.06l-4.25 4.5a.75.75 0 0 1-1.047.042l-2.25-2.025A.75.75 0 0 1 7.25 9.667l1.706 1.536 3.748-3.968a.75.75 0 0 1 1.06-.03z" clip-rule="evenodd"></path></svg>`;

    // --- Загрузка переводов ---
    let translations = {};
    let currentLang = 'ru';
    
    function getUrlParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }
    
    async function loadTranslations(lang) {
        const response = await fetch(`/translations/${lang}.json`);
        if (!response.ok) throw new Error(`Failed to load ${lang} translations`);
        return await response.json();
    }
    
    function applyTranslations() {
        document.title = translations.site_title || "Glists";
        const langToggle = document.getElementById('langToggle');
        if (langToggle) langToggle.innerText = currentLang === 'ru' ? translations.lang_ru : translations.lang_en;
        const themeToggle = document.getElementById('themeToggle');
        if (themeToggle) themeToggle.innerText = document.body.classList.contains('dark') ? translations.theme_light : translations.theme_dark;
        const feedTitle = document.getElementById('feedTitle');
        if (feedTitle) feedTitle.innerText = translations.feed_title;
        const postInput = document.getElementById('postInput');
        if (postInput) postInput.placeholder = translations.post_placeholder;
        const loginBtn = document.getElementById('loginBtn');
        if (loginBtn) loginBtn.innerText = translations.login;
        const registerBtn = document.getElementById('registerBtn');
        if (registerBtn) registerBtn.innerText = translations.register;
        const publishBtn = document.getElementById('publishBtn');
        if (publishBtn) publishBtn.innerText = translations.publish;
        const addPollBtn = document.getElementById('addPollBtn');
        if (addPollBtn) addPollBtn.innerText = translations.add_poll;
        const searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.placeholder = translations.search_placeholder;
    }
    
    const urlLang = getUrlParam('hl');
    if (urlLang && (urlLang === 'ru' || urlLang === 'en')) {
        currentLang = urlLang;
        localStorage.setItem('glists_lang', currentLang);
    } else {
        const savedLang = localStorage.getItem('glists_lang');
        if (savedLang && (savedLang === 'ru' || savedLang === 'en')) currentLang = savedLang;
    }
    
    try {
        translations = await loadTranslations(currentLang);
    } catch(e) { console.error(e); }
    applyTranslations();
    
    document.getElementById('langToggle').onclick = () => {
        const newLang = currentLang === 'ru' ? 'en' : 'ru';
        const url = new URL(window.location.href);
        url.searchParams.set('hl', newLang);
        window.location.href = url.toString();
    };
    
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('glists_theme') === 'dark') document.body.classList.add('dark');
    themeToggle.onclick = () => {
        document.body.classList.toggle('dark');
        localStorage.setItem('glists_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        themeToggle.innerText = document.body.classList.contains('dark') ? translations.theme_light : translations.theme_dark;
    };
    themeToggle.innerText = document.body.classList.contains('dark') ? translations.theme_light : translations.theme_dark;
    
    const authDiv = document.getElementById('authContainer');
    const feedDiv = document.getElementById('feedContainer');
    const loginEmail = document.getElementById('loginEmail');
    const loginPass = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const regEmail = document.getElementById('registerEmail');
    const regPass = document.getElementById('registerPassword');
    const regBtn = document.getElementById('registerBtn');
    
    loginBtn.onclick = () => signInWithEmailAndPassword(auth, loginEmail.value, loginPass.value).catch(e => alert(e.message));
    regBtn.onclick = async () => {
        const email = regEmail.value, pass = regPass.value;
        if (!email || !pass) return alert("Заполни поля");
        try {
            const cred = await createUserWithEmailAndPassword(auth, email, pass);
            const username = email.split('@')[0];
            const displayName = prompt("Введите ваше отображаемое имя:", username);
            await setDoc(doc(db, "users", username), {
                email, displayName: displayName || username, verified: false,
                bio: "Новый пользователь Glists", createdAt: new Date(), uid: cred.user.uid, avatarUrl: '',
                blockedBy: [], pinnedPostId: null
            });
            alert("Готово!");
        } catch(e) { alert(e.message); }
    };
    
    let currentPoll = null;
    const CLOUD_NAME = "dbmiuq6s7";
    const UPLOAD_PRESET = "glists_preset";
    let unsubscribeFeed = null;
    
    const userCache = new Map();
    async function getUserInfo(uid) {
        if (userCache.has(uid)) return userCache.get(uid);
        try {
            const q = query(collection(db, 'users'), where('uid', '==', uid));
            const snap = await getDocs(q);
            if (!snap.empty) {
                const docData = snap.docs[0].data();
                const info = {
                    username: snap.docs[0].id,
                    displayName: docData.displayName || snap.docs[0].id,
                    verified: docData.verified === true,
                    avatarUrl: docData.avatarUrl || '',
                    blockedBy: docData.blockedBy || []
                };
                userCache.set(uid, info);
                return info;
            }
        } catch(e) { console.error(e); }
        return null;
    }
    
    async function sendNotification(toUid, type, fromUid, fromName, postId = null, commentId = null) {
        if (toUid === fromUid) return;
        await addDoc(collection(db, 'notifications'), {
            uid: toUid, type, fromUid, fromName, postId, commentId, createdAt: new Date(), read: false
        });
    }
    
    async function toggleReaction(postId, userId, type) {
        const likeRef = doc(db, 'likes', `${postId}_${userId}`);
        const dislikeRef = doc(db, 'dislikes', `${postId}_${userId}`);
        const likeSnap = await getDoc(likeRef);
        const dislikeSnap = await getDoc(dislikeRef);
        if (type === 'like') {
            if (likeSnap.exists()) {
                await deleteDoc(likeRef);
                await updateDoc(doc(db, 'posts', postId), { likesCount: increment(-1) });
            } else {
                if (dislikeSnap.exists()) {
                    await deleteDoc(dislikeRef);
                    await updateDoc(doc(db, 'posts', postId), { dislikesCount: increment(-1) });
                }
                await setDoc(likeRef, { postId, userId, createdAt: new Date() });
                await updateDoc(doc(db, 'posts', postId), { likesCount: increment(1) });
                const postSnap = await getDoc(doc(db, 'posts', postId));
                if (postSnap.exists() && postSnap.data().uid !== userId) {
                    await sendNotification(postSnap.data().uid, 'like', userId, (await getUserInfo(userId)).displayName, postId);
                }
            }
        } else if (type === 'dislike') {
            if (dislikeSnap.exists()) {
                await deleteDoc(dislikeRef);
                await updateDoc(doc(db, 'posts', postId), { dislikesCount: increment(-1) });
            } else {
                if (likeSnap.exists()) {
                    await deleteDoc(likeRef);
                    await updateDoc(doc(db, 'posts', postId), { likesCount: increment(-1) });
                }
                await setDoc(dislikeRef, { postId, userId, createdAt: new Date() });
                await updateDoc(doc(db, 'posts', postId), { dislikesCount: increment(1) });
            }
        }
    }
    
    async function uploadImage(file) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
        const data = await res.json();
        return data.secure_url;
    }
    
    function parseTextWithLinks(text) {
        let parsed = text.replace(/@(\w+)/g, '<a href="/profile.html?user=$1">@$1</a>');
        parsed = parsed.replace(/#(\w+)/g, '<a href="#" class="hashtag-link" data-tag="$1">#$1</a>');
        return parsed;
    }
    
    function searchPosts(postsData, queryStr) {
        const lowerQuery = queryStr.toLowerCase();
        return postsData.filter(p => (p.text && p.text.toLowerCase().includes(lowerQuery)) || (p.authorDisplayName && p.authorDisplayName.toLowerCase().includes(lowerQuery)));
    }
    
    function subscribeToFeed() {
        if (unsubscribeFeed) unsubscribeFeed();
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        unsubscribeFeed = onSnapshot(q, async (snap) => {
            const postsData = [];
            snap.forEach(docSnap => postsData.push({ id: docSnap.id, ...docSnap.data() }));
            const currentUserObj = auth.currentUser;
            let blockedByMe = [];
            if (currentUserObj) {
                const myUserRef = query(collection(db, 'users'), where('uid', '==', currentUserObj.uid));
                const mySnap = await getDocs(myUserRef);
                if (!mySnap.empty) blockedByMe = mySnap.docs[0].data().blockedBy || [];
            }
            const filteredPosts = postsData.filter(p => !blockedByMe.includes(p.uid));
            const searchInput = document.getElementById('searchInput');
            let searchTerm = searchInput ? searchInput.value.trim() : '';
            let displayPosts = searchTerm ? searchPosts(filteredPosts, searchTerm) : filteredPosts;
            const feedList = document.getElementById('feedList');
            if (!feedList) return;
            feedList.innerHTML = "";
            for (const data of displayPosts) {
                const postId = data.id;
                const date = data.createdAt ? new Date(data.createdAt.toDate()).toLocaleString() : "";
                const isOwner = currentUserObj && currentUserObj.uid === data.uid;
                let liked = false, disliked = false;
                if (currentUserObj) {
                    const likeRef = doc(db, 'likes', `${postId}_${currentUserObj.uid}`);
                    const dislikeRef = doc(db, 'dislikes', `${postId}_${currentUserObj.uid}`);
                    liked = (await getDoc(likeRef)).exists();
                    disliked = (await getDoc(dislikeRef)).exists();
                }
                let displayName = data.authorDisplayName;
                let authorUsername = data.authorUsername;
                let avatarUrl = data.authorAvatar;
                let verified = false;
                if (!displayName || !authorUsername) {
                    const info = await getUserInfo(data.uid);
                    if (info) { displayName = info.displayName; authorUsername = info.username; verified = info.verified; avatarUrl = info.avatarUrl; }
                    else { displayName = data.email.split('@')[0]; authorUsername = data.email.split('@')[0]; }
                } else { const info = await getUserInfo(data.uid); if (info) verified = info.verified; }
                const avatarHtml = avatarUrl ? `<img src="${escapeHtml(avatarUrl)}" class="small-avatar">` : `<div class="small-avatar">${displayName.charAt(0).toUpperCase()}</div>`;
                let repostHtml = '';
                if (data.type === 'repost') {
                    repostHtml = `<div class="repost-badge">🔁 ${translations.reposted_prefix} <a href="/profile.html?user=${escapeHtml(data.originalAuthorUsername)}">${escapeHtml(data.originalAuthorDisplayName)}</a></div>
                    <div class="original-post-link"><a href="/profile.html?user=${escapeHtml(data.originalAuthorUsername)}">@${escapeHtml(data.originalAuthorUsername)}</a>: ${escapeHtml(data.originalText)}</div>`;
                }
                let imageHtml = data.imageUrl ? `<img src="${escapeHtml(data.imageUrl)}" class="post-image">` : '';
                let pollHtml = '';
                if (data.hasPoll && data.pollId) {
                    const pollRef = doc(db, 'polls', data.pollId);
                    const pollSnap = await getDoc(pollRef);
                    if (pollSnap.exists()) {
                        const poll = pollSnap.data();
                        const total = poll.totalVotes || 0;
                        const userVoteRef = doc(db, 'pollVotes', `${data.pollId}_${currentUserObj?.uid}`);
                        const userVoteSnap = currentUserObj ? await getDoc(userVoteRef) : null;
                        pollHtml = `<div class="poll-container"><strong>${escapeHtml(poll.question)}</strong>`;
                        poll.options.forEach((opt, idx) => {
                            const votes = poll.votes[idx] || 0;
                            const percent = total ? Math.round((votes/total)*100) : 0;
                            pollHtml += `<div class="poll-option">
                                <button ${userVoteSnap?.exists() ? 'disabled' : ''} class="vote-option" data-pollid="${data.pollId}" data-option="${idx}">${escapeHtml(opt)}</button>
                                <span>${votes} (${percent}%)</span>
                            </div>`;
                        });
                        pollHtml += `</div>`;
                    }
                }
                const postDiv = document.createElement('div');
                postDiv.className = 'post';
                postDiv.innerHTML = `
                    ${repostHtml}
                    <div class="post-header">
                        <div class="post-author">
                            ${avatarHtml}
                            <a href="/profile.html?user=${escapeHtml(authorUsername)}">${escapeHtml(displayName)}</a>
                            ${verified ? `<span class="verified-icon">${verifiedSVG}</span>` : ''}
                        </div>
                        <div>
                            <span class="post-date">${date}</span>
                            ${isOwner ? `<button class="edit-post-btn" data-id="${postId}">✏️</button>` : ''}
                            ${isOwner ? `<button class="pin-btn ${data.pinned ? 'pinned' : ''}" data-id="${postId}">📌</button>` : ''}
                            ${currentUserObj && !isOwner ? `<button class="block-btn" data-username="${escapeHtml(authorUsername)}">🚫</button>` : ''}
                        </div>
                    </div>
                    ${data.type !== 'repost' ? `<div class="post-text">${parseTextWithLinks(escapeHtml(data.text))}</div>` : ''}
                    ${imageHtml}
                    ${pollHtml}
                    <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
                        <button class="like-btn ${liked ? 'liked' : ''}" data-postid="${postId}">❤️ ${data.likesCount || 0}</button>
                        <button class="dislike-btn ${disliked ? 'disliked' : ''}" data-postid="${postId}">👎 ${data.dislikesCount || 0}</button>
                        ${currentUserObj ? `<button class="repost-btn" data-postid="${postId}" data-uid="${data.uid}" data-username="${escapeHtml(authorUsername)}" data-displayname="${escapeHtml(displayName)}" data-text="${escapeHtml(data.text || '')}">🔁 ${translations.repost}</button>` : ''}
                        ${isOwner ? `<button class="delete-btn" data-id="${postId}">${translations.delete}</button>` : ''}
                    </div>
                    <div class="comments-section" id="comments-${postId}">
                        <div class="comments-list"></div>
                        <div class="add-comment">
                            <input type="text" placeholder="${translations.comment_placeholder}" class="comment-input">
                            <button class="add-comment-btn">${translations.add_comment}</button>
                        </div>
                    </div>
                `;
                feedList.appendChild(postDiv);
                postDiv.querySelector('.like-btn')?.addEventListener('click', () => toggleReaction(postId, currentUserObj?.uid, 'like'));
                postDiv.querySelector('.dislike-btn')?.addEventListener('click', () => toggleReaction(postId, currentUserObj?.uid, 'dislike'));
                if (currentUserObj) {
                    postDiv.querySelector('.repost-btn')?.addEventListener('click', () => repost(postId, data.uid, authorUsername, displayName, data.text || '', currentUserObj));
                }
                if (isOwner) {
                    postDiv.querySelector('.edit-post-btn')?.addEventListener('click', async () => {
                        const newText = prompt(translations.edit, data.text);
                        if (newText) await editPost(postId, newText);
                    });
                    postDiv.querySelector('.pin-btn')?.addEventListener('click', async () => {
                        await pinPost(authorUsername, postId, currentUserObj.uid);
                    });
                    postDiv.querySelector('.delete-btn')?.addEventListener('click', () => deleteDoc(doc(db, "posts", postId)));
                }
                postDiv.querySelectorAll('.block-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const username = btn.dataset.username;
                        if (confirm(translations.block_user_confirm.replace('{username}', username))) await blockUser(username, currentUserObj.uid);
                    });
                });
                postDiv.querySelectorAll('.vote-option').forEach(btn => {
                    btn.addEventListener('click', () => votePoll(btn.dataset.pollid, parseInt(btn.dataset.option), currentUserObj.uid));
                });
                const commentsQuery = query(collection(db, 'comments'), where('postId', '==', postId), orderBy('createdAt', 'asc'));
                onSnapshot(commentsQuery, (commentsSnap) => {
                    const commentsListDiv = postDiv.querySelector('.comments-list');
                    if (!commentsListDiv) return;
                    commentsListDiv.innerHTML = '';
                    commentsSnap.forEach(commentDoc => {
                        const c = commentDoc.data();
                        const commentId = commentDoc.id;
                        const cDate = c.createdAt ? new Date(c.createdAt.toDate()).toLocaleString() : '';
                        const isCommentOwner = currentUserObj && currentUserObj.uid === c.uid;
                        const commentAvatarHtml = c.authorAvatar ? `<img src="${escapeHtml(c.authorAvatar)}" class="comment-avatar">` : `<div class="comment-avatar">${c.authorDisplayName?.charAt(0).toUpperCase() || '?'}</div>`;
                        const commentDiv = document.createElement('div');
                        commentDiv.className = 'comment';
                        commentDiv.innerHTML = `
                            ${commentAvatarHtml}
                            <div class="comment-content">
                                <div><span class="comment-author">${escapeHtml(c.authorDisplayName)}</span> <span class="comment-date">${cDate}</span></div>
                                <div class="comment-text">${parseTextWithLinks(escapeHtml(c.text))}</div>
                            </div>
                            ${isCommentOwner ? `<button class="delete-comment-btn" data-commentid="${commentId}">🗑</button>` : ''}
                        `;
                        commentsListDiv.appendChild(commentDiv);
                        if (isCommentOwner) commentDiv.querySelector('.delete-comment-btn').onclick = () => deleteComment(commentId);
                    });
                });
                const addCommentBtn = postDiv.querySelector('.add-comment-btn');
                const commentInput = postDiv.querySelector('.comment-input');
                addCommentBtn.onclick = async () => {
                    if (!currentUserObj) { alert(translations.login_first); return; }
                    await addComment(postId, commentInput.value, currentUserObj);
                    commentInput.value = '';
                };
            }
        });
    }
    
    async function repost(originalPostId, originalAuthorUid, originalAuthorUsername, originalAuthorDisplayName, originalText, currentUser) {
        const info = await getUserInfo(currentUser.uid);
        const authorUsername = info.username;
        const authorDisplayName = info.displayName;
        const authorAvatar = info.avatarUrl;
        await addDoc(collection(db, "posts"), {
            type: 'repost',
            originalPostId, originalAuthorUid, originalAuthorUsername, originalAuthorDisplayName,
            originalText: originalText.substring(0, 100),
            uid: currentUser.uid, email: currentUser.email,
            authorUsername, authorDisplayName, authorAvatar,
            createdAt: new Date(), likesCount: 0, dislikesCount: 0,
            edited: false, hasPoll: false, pollId: null, imageUrl: null, pinned: false
        });
        await sendNotification(originalAuthorUid, 'repost', currentUser.uid, authorDisplayName, originalPostId);
    }
    
    async function addComment(postId, text, user) {
        if (!text.trim()) return;
        const info = await getUserInfo(user.uid);
        const authorDisplayName = info.displayName;
        const authorUsername = info.username;
        const authorAvatar = info.avatarUrl;
        const commentRef = await addDoc(collection(db, 'comments'), {
            postId, text: text.trim(), uid: user.uid,
            authorDisplayName, authorUsername, authorAvatar,
            createdAt: new Date()
        });
        const postSnap = await getDoc(doc(db, 'posts', postId));
        if (postSnap.exists() && postSnap.data().uid !== user.uid) {
            await sendNotification(postSnap.data().uid, 'comment', user.uid, authorDisplayName, postId, commentRef.id);
        }
    }
    
    async function deleteComment(commentId) {
        await deleteDoc(doc(db, 'comments', commentId));
    }
    
    async function editPost(postId, newText) {
        await updateDoc(doc(db, 'posts', postId), { text: newText, edited: true, editedAt: new Date() });
    }
    
    async function pinPost(username, postId, currentUid) {
        const userRef = doc(db, 'users', username);
        const userSnap = await getDoc(userRef);
        if (userSnap.exists() && userSnap.data().uid === currentUid) {
            await updateDoc(userRef, { pinnedPostId: postId });
            await updateDoc(doc(db, 'posts', postId), { pinned: true });
        }
    }
    
    async function blockUser(blockedUsername, currentUid) {
        const blockedUserRef = doc(db, 'users', blockedUsername);
        const blockedSnap = await getDoc(blockedUserRef);
        if (blockedSnap.exists()) {
            await updateDoc(blockedUserRef, { blockedBy: arrayUnion(currentUid) });
        }
    }
    
    async function votePoll(pollId, optionIndex, userId) {
        const pollRef = doc(db, 'polls', pollId);
        const voteId = `${pollId}_${userId}`;
        const voteRef = doc(db, 'pollVotes', voteId);
        const voteSnap = await getDoc(voteRef);
        if (voteSnap.exists()) return;
        await setDoc(voteRef, { pollId, userId, optionIndex, votedAt: new Date() });
        await updateDoc(pollRef, {
            [`votes.${optionIndex}`]: increment(1),
            totalVotes: increment(1)
        });
    }
    
    function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => m == '&' ? '&amp;' : m == '<' ? '&lt;' : '&gt;') : ''; }
    
    onAuthStateChanged(auth, user => {
        if (user) {
            authDiv.style.display = 'none';
            feedDiv.style.display = 'block';
            
            const currentUserSpan = document.getElementById('currentUser');
            if (currentUserSpan) currentUserSpan.innerText = user.email;
            const greetingDiv = document.getElementById('greeting');
            if (greetingDiv) greetingDiv.innerHTML = `${translations.greeting}, <span id="currentUser"></span> <button id="logoutBtn">${translations.logout}</button>`;
            
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) logoutBtn.onclick = () => signOut(auth);
            
            const publishBtn = document.getElementById('publishBtn');
            const postInput = document.getElementById('postInput');
            const postImageInput = document.getElementById('postImageInput');
            if (publishBtn) {
                publishBtn.onclick = async () => {
                    const text = postInput.value.trim();
                    const imageFile = postImageInput.files[0];
                    let imageUrl = null;
                    if (imageFile) imageUrl = await uploadImage(imageFile);
                    const currentUserObj = auth.currentUser;
                    if (!currentUserObj) return alert(translations.login_first);
                    const info = await getUserInfo(currentUserObj.uid);
                    const authorUsername = info.username;
                    const authorDisplayName = info.displayName;
                    const authorAvatar = info.avatarUrl;
                    let pollId = null;
                    if (currentPoll) {
                        const pollRef = await addDoc(collection(db, 'polls'), {
                            question: currentPoll.question,
                            options: currentPoll.options,
                            votes: {},
                            totalVotes: 0,
                            authorUid: currentUserObj.uid,
                            createdAt: new Date()
                        });
                        pollId = pollRef.id;
                        currentPoll = null;
                    }
                    await addDoc(collection(db, "posts"), {
                        type: 'post', text, uid: currentUserObj.uid, email: currentUserObj.email,
                        authorUsername, authorDisplayName, authorAvatar,
                        createdAt: new Date(), likesCount: 0, dislikesCount: 0,
                        edited: false, hasPoll: !!pollId, pollId, imageUrl, pinned: false
                    });
                    postInput.value = "";
                    postImageInput.value = "";
                };
            }
            
            const addPollBtn = document.getElementById('addPollBtn');
            if (addPollBtn) {
                addPollBtn.onclick = () => {
                    const question = prompt(translations.poll_question);
                    if (!question) return;
                    const options = [];
                    let opt;
                    for (let i=0; i<5; i++) {
                        opt = prompt(`${translations.poll_option} ${i+1} (оставьте пустым для завершения):`);
                        if (!opt) break;
                        options.push(opt);
                    }
                    if (options.length < 2) return alert(translations.poll_need_two_options);
                    currentPoll = { question, options };
                    alert(translations.poll_added);
                };
            }
            
            const searchToggle = document.getElementById('searchToggle');
            const searchBox = document.getElementById('searchBox');
            if (searchToggle) {
                searchToggle.onclick = () => { searchBox.style.display = searchBox.style.display === 'none' ? 'block' : 'none'; };
            }
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.oninput = () => { if (unsubscribeFeed) subscribeToFeed(); };
            }
            
            subscribeToFeed();
        } else {
            authDiv.style.display = 'flex';
            feedDiv.style.display = 'none';
            if (unsubscribeFeed) unsubscribeFeed();
            const feedList = document.getElementById('feedList');
            if (feedList) feedList.innerHTML = "";
        }
    });
		// Кнопка установки PWA
	let deferredPrompt = null;

	// Создаём кнопку (если её ещё нет)
	const installButton = document.createElement('button');
	installButton.id = 'installPwaBtn';
	installButton.textContent = '📲 Установить приложение';
	installButton.style.display = 'none';
	installButton.style.position = 'fixed';
	installButton.style.bottom = '20px';
	installButton.style.right = '20px';
	installButton.style.zIndex = '1000';
	installButton.style.backgroundColor = '#1877f2';
	installButton.style.color = 'white';
	installButton.style.border = 'none';
	installButton.style.borderRadius = '40px';
	installButton.style.padding = '12px 20px';
	installButton.style.cursor = 'pointer';
	installButton.style.boxShadow = '0 2px 8px rgba(0,0,0,0.2)';
	installButton.style.fontWeight = 'bold';
	document.body.appendChild(installButton);

	// Перехватываем событие браузера
	window.addEventListener('beforeinstallprompt', (e) => {
	  e.preventDefault();
	  deferredPrompt = e;
	  installButton.style.display = 'block';
	});

	// Обработчик клика по кнопке
	installButton.addEventListener('click', async () => {
	  if (!deferredPrompt) return;
	  deferredPrompt.prompt();
	  const { outcome } = await deferredPrompt.userChoice;
	  console.log(`Пользователь ${outcome === 'accepted' ? 'установил' : 'отказался'} PWA`);
	  deferredPrompt = null;
	  installButton.style.display = 'none';
	});

	// Скрываем кнопку, если уже установлено (необязательно)
	window.addEventListener('appinstalled', () => {
	  installButton.style.display = 'none';
	  deferredPrompt = null;
	  console.log('PWA успешно установлено');
	});
</script>
