<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Glists</title>
    <style>
        body { background: #f0f2f5; font-family: system-ui, sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 16px; padding: 20px; }
        input, button { padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #ddd; }
        button { background: #1877f2; color: white; border: none; cursor: pointer; }
        .post { background: #f8f9fa; margin: 10px 0; padding: 10px; border-left: 4px solid #1877f2; border-radius: 8px; }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.8rem; color: #555; }
        .post-author a { color: #1e2a3e; text-decoration: none; font-weight: bold; }
        .delete-btn { background: #dc3545; color: white; border: none; border-radius: 20px; padding: 4px 12px; cursor: pointer; }
        .verified-icon { display: inline-flex; margin-left: 4px; vertical-align: middle; }
    </style>
</head>
<body>
<div class="container">
    <h1>🐛 Glists</h1>
    <div id="authContainer">
        <div><input id="loginEmail" placeholder="Почта"> <input id="loginPassword" type="password" placeholder="Пароль"> <button id="loginBtn">Вход</button></div>
        <div><input id="registerEmail" placeholder="Новая почта"> <input id="registerPassword" type="password" placeholder="Пароль"> <button id="registerBtn">Регистрация</button></div>
    </div>
    <div id="feedContainer" style="display:none">
        <div>Привет, <span id="currentUser"></span> <button id="logoutBtn">Выйти</button></div>
        <div><input id="postInput" placeholder="Что нового?"> <button id="publishBtn">Опубликовать</button></div>
        <hr><h3>Лента</h3><div id="feedList"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, setDoc, getDocs, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCzqpQniq7LiwRZ_L_FKEsIXh6CfC76QHA",
        authDomain: "myfirstsocialnetwork-0.firebaseapp.com",
        projectId: "myfirstsocialnetwork-0",
        storageBucket: "myfirstsocialnetwork-0.firebasestorage.app",
        messagingSenderId: "557037045975",
        appId: "1:557037045975:web:dbcbd7ca0111a1494ac892"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const verifiedSVG = `<svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path fill="rgb(0, 149, 246)" d="M8.248 2.87a2.198 2.198 0 0 1 3.504 0c.48.633 1.264.958 2.05.85a2.198 2.198 0 0 1 2.478 2.477 2.2 2.2 0 0 0 .85 2.051 2.198 2.198 0 0 1 0 3.504 2.2 2.2 0 0 0-.85 2.05 2.198 2.198 0 0 1-2.477 2.478 2.2 2.2 0 0 0-2.051.85 2.198 2.198 0 0 1-3.504 0 2.2 2.2 0 0 0-2.05-.85 2.198 2.198 0 0 1-2.478-2.477 2.2 2.2 0 0 0-.85-2.051 2.198 2.198 0 0 1 0-3.504c.633-.48.958-1.264.85-2.05A2.198 2.198 0 0 1 6.197 3.72a2.2 2.2 0 0 0 2.051-.85"></path><path fill="#fff" fill-rule="evenodd" d="M13.765 7.205a.75.75 0 0 1 .03 1.06l-4.25 4.5a.75.75 0 0 1-1.047.042l-2.25-2.025A.75.75 0 0 1 7.25 9.667l1.706 1.536 3.748-3.968a.75.75 0 0 1 1.06-.03z" clip-rule="evenodd"></path></svg>`;

    const authDiv = document.getElementById('authContainer');
    const feedDiv = document.getElementById('feedContainer');
    const loginEmail = document.getElementById('loginEmail');
    const loginPass = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const regEmail = document.getElementById('registerEmail');
    const regPass = document.getElementById('registerPassword');
    const regBtn = document.getElementById('registerBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const postInput = document.getElementById('postInput');
    const publishBtn = document.getElementById('publishBtn');
    const feedList = document.getElementById('feedList');
    const currentUserSpan = document.getElementById('currentUser');

    // Кэш: uid -> { username, displayName, verified }
    const userCache = new Map();

    async function getUserInfo(uid) {
        if (userCache.has(uid)) return userCache.get(uid);
        try {
            const q = query(collection(db, 'users'), where('uid', '==', uid));
            const snap = await getDocs(q);
            if (!snap.empty) {
                const docData = snap.docs[0].data();
                const info = {
                    username: snap.docs[0].id,
                    displayName: docData.displayName || snap.docs[0].id,
                    verified: docData.verified === true
                };
                userCache.set(uid, info);
                return info;
            }
        } catch(e) { console.error(e); }
        return null;
    }

    loginBtn.onclick = () => signInWithEmailAndPassword(auth, loginEmail.value, loginPass.value).catch(e => alert(e.message));

    regBtn.onclick = async () => {
        const email = regEmail.value, pass = regPass.value;
        if (!email || !pass) return alert("Заполни поля");
        try {
            const cred = await createUserWithEmailAndPassword(auth, email, pass);
            const username = email.split('@')[0];
            const displayName = prompt("Введите ваше отображаемое имя (например, Нормик Чел):", username);
            await setDoc(doc(db, "users", username), {
                email: email,
                displayName: displayName || username,
                verified: false,
                bio: "Новый пользователь Glists",
                createdAt: new Date(),
                uid: cred.user.uid
            });
            alert("Готово!");
        } catch(e) { alert(e.message); }
    };

    logoutBtn.onclick = () => signOut(auth);

    publishBtn.onclick = async () => {
        const text = postInput.value.trim();
        if (!text) return alert("Напиши пост");
        const user = auth.currentUser;
        if (!user) return alert("Войди");
        const info = await getUserInfo(user.uid);
        const authorUsername = info ? info.username : user.email.split('@')[0];
        const authorDisplayName = info ? info.displayName : authorUsername;
        await addDoc(collection(db, "posts"), {
            text,
            uid: user.uid,
            email: user.email,
            authorUsername: authorUsername,
            authorDisplayName: authorDisplayName,
            createdAt: new Date()
        });
        postInput.value = "";
    };

    function subscribeToFeed() {
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        onSnapshot(q, async (snap) => {
            feedList.innerHTML = "";
            const currentUser = auth.currentUser;
            for (const docSnap of snap.docs) {
                const data = docSnap.data();
                const postId = docSnap.id;
                const date = data.createdAt ? new Date(data.createdAt.toDate()).toLocaleString() : "";
                const isOwner = currentUser && currentUser.uid === data.uid;
                
                let displayName = data.authorDisplayName;
                let authorUsername = data.authorUsername;
                let verified = false;
                
                if (!displayName || !authorUsername) {
                    const info = await getUserInfo(data.uid);
                    if (info) {
                        displayName = info.displayName;
                        authorUsername = info.username;
                        verified = info.verified;
                    } else {
                        displayName = data.email.split('@')[0];
                        authorUsername = data.email.split('@')[0];
                    }
                } else {
                    // проверяем верификацию по uid
                    const info = await getUserInfo(data.uid);
                    if (info) verified = info.verified;
                }
                
                const div = document.createElement('div');
                div.className = 'post';
                div.innerHTML = `
                    <div class="post-header">
                        <div class="post-author">
                            <a href="/profile.html?user=${escapeHtml(authorUsername)}">${escapeHtml(displayName)}</a>
                            ${verified ? `<span class="verified-icon">${verifiedSVG}</span>` : ''}
                        </div>
                        <span class="post-date">${date}</span>
                    </div>
                    <div class="post-text">${escapeHtml(data.text)}</div>
                    ${isOwner ? `<button class="delete-btn" data-id="${postId}">Удалить</button>` : ''}
                `;
                feedList.appendChild(div);
                if (isOwner) {
                    div.querySelector('.delete-btn').onclick = () => deleteDoc(doc(db, "posts", postId));
                }
            }
        });
    }

    function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => m == '&' ? '&amp;' : m == '<' ? '&lt;' : '&gt;') : ''; }

    onAuthStateChanged(auth, user => {
        if (user) {
            authDiv.style.display = 'none';
            feedDiv.style.display = 'block';
            currentUserSpan.innerText = user.email;
            subscribeToFeed();
        } else {
            authDiv.style.display = 'flex';
            feedDiv.style.display = 'none';
            feedList.innerHTML = "";
        }
    });
</script>
</body>
</html>
