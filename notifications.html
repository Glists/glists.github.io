<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Glists - Notifications</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1 id="pageTitle">🔔 Уведомления</h1>
        <button class="lang-toggle" id="langToggle">🇷🇺 RU</button>
    </div>
    <div id="notificationsList">Загрузка...</div>
    <a href="/" class="back-link" id="backLink">← На главную</a>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, query, where, orderBy, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const config = {
        apiKey: "AIzaSyCzqpQniq7LiwRZ_L_FKEsIXh6CfC76QHA",
        authDomain: "myfirstsocialnetwork-0.firebaseapp.com",
        projectId: "myfirstsocialnetwork-0",
        storageBucket: "myfirstsocialnetwork-0.firebasestorage.app",
        messagingSenderId: "557037045975",
        appId: "1:557037045975:web:dbcbd7ca0111a1494ac892"
    };
    const app = initializeApp(config);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- Загрузка переводов ---
    let translations = {};
    let currentLang = 'ru';
    
    function getUrlParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }
    
    async function loadTranslations(lang) {
        const response = await fetch(`/translations/${lang}.json`);
        if (!response.ok) throw new Error(`Failed to load ${lang} translations`);
        return await response.json();
    }
    
    function applyTranslations() {
        document.title = translations.site_title || "Glists";
        const pageTitle = document.getElementById('pageTitle');
        if (pageTitle) pageTitle.innerText = translations.notifications || "Уведомления";
        const backLink = document.getElementById('backLink');
        if (backLink) backLink.innerText = translations.back_home || "← На главную";
        const langToggle = document.getElementById('langToggle');
        if (langToggle) langToggle.innerText = currentLang === 'ru' ? translations.lang_ru : translations.lang_en;
    }
    
    // Инициализация языка
    const urlLang = getUrlParam('hl');
    if (urlLang && (urlLang === 'ru' || urlLang === 'en')) {
        currentLang = urlLang;
        localStorage.setItem('glists_lang', currentLang);
    } else {
        const savedLang = localStorage.getItem('glists_lang');
        if (savedLang && (savedLang === 'ru' || savedLang === 'en')) currentLang = savedLang;
    }
    
    try {
        translations = await loadTranslations(currentLang);
    } catch(e) { console.error(e); }
    applyTranslations();
    
    document.getElementById('langToggle').onclick = () => {
        const newLang = currentLang === 'ru' ? 'en' : 'ru';
        const url = new URL(window.location.href);
        url.searchParams.set('hl', newLang);
        window.location.href = url.toString();
    };
    
    // Тема
    if (localStorage.getItem('glists_theme') === 'dark') document.body.classList.add('dark');
    
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = '/'; return; }
        const q = query(collection(db, 'notifications'), where('uid', '==', user.uid), orderBy('createdAt', 'desc'));
        onSnapshot(q, (snap) => {
            const container = document.getElementById('notificationsList');
            container.innerHTML = '';
            snap.forEach(docSnap => {
                const n = docSnap.data();
                const isUnread = !n.read;
                const div = document.createElement('div');
                div.className = `notification ${isUnread ? 'unread' : ''}`;
                let text = '';
                switch (n.type) {
                    case 'like': text = translations.liked_your_post?.replace('{name}', n.fromName) || `${n.fromName} лайкнул ваш пост`; break;
                    case 'repost': text = translations.reposted_your_post?.replace('{name}', n.fromName) || `${n.fromName} репостнул ваш пост`; break;
                    case 'comment': text = translations.commented_your_post?.replace('{name}', n.fromName) || `${n.fromName} оставил комментарий`; break;
                    case 'mention': text = translations.mentioned_you?.replace('{name}', n.fromName) || `${n.fromName} упомянул вас`; break;
                    default: text = translations.notification_default || "Новое уведомление";
                }
                div.innerHTML = `<div>${text}</div><small>${new Date(n.createdAt.toDate()).toLocaleString()}</small>`;
                container.appendChild(div);
                if (isUnread) {
                    updateDoc(doc(db, 'notifications', docSnap.id), { read: true });
                }
            });
            if (snap.empty) container.innerHTML = `<p>${translations.no_notifications || "Уведомлений пока нет"}</p>`;
        });
    });
</script>
</body>
</html>
