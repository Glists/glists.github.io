<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
	<!-- Фавиконки -->
	<link rel="icon" type="image/x-icon" href="/favicon.ico">
	<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
	<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
	<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
	<link rel="manifest" href="/site.webmanifest"> <!-- создадим ниже -->
	<link rel="mask-icon" href="/safari-pinned-tab.svg" color="#1877f2"> <!-- опционально -->
	<meta name="msapplication-TileColor" content="#1877f2">
	<meta name="theme-color" content="#1877f2">
	<!-- Базовые мета -->
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<meta name="description" content="Glists — тёмная социальная сеть с постами, опросами, лайками и сообщениями. Присоединяйся к Глистам!">
	<meta name="keywords" content="социальная сеть, Глисты, Glists, посты, опросы, сообщения, тёмная тема, общение, лайки">
	<meta name="author" content="Нормик Чел">
	<meta name="copyright" content="Glists">
	<meta name="robots" content="noindex, follow">
	<meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
	<meta name="bingbot" content="index, follow">
	<meta name="yandex" content="index, follow">
	<link rel="canonical" href="https://glists.github.io/">

	<!-- Альтернативные языки (если у тебя есть /?hl=ru и /?hl=en) -->
	<link rel="alternate" hreflang="ru" href="https://glists.github.io/?hl=ru">
	<link rel="alternate" hreflang="en" href="https://glists.github.io/?hl=en">
	<link rel="alternate" hreflang="x-default" href="https://glists.github.io/">

	<!-- Open Graph / Facebook / VK / Telegram / OK -->
	<meta property="og:type" content="website">
	<meta property="og:url" content="https://glists.github.io/">
	<meta property="og:title" content="🔔 Уведомления |🐛 Glists">
	<meta property="og:description" content="🔔 Уведомления в соцсети Glists 🐛">
	<meta property="og:image" content="https://glists.github.io/android-chrome-512x512.png">
	<meta property="og:image:width" content="512">
	<meta property="og:image:height" content="512">
	<meta property="og:image:alt" content="Glists логотип — жук">
	<meta property="og:locale" content="ru_RU">
	<meta property="og:locale:alternate" content="en_US">
	<meta property="og:site_name" content="Glists">

	<!-- Twitter Card (для твиттера) -->
	<meta name="twitter:card" content="summary_large_image">
	<meta name="twitter:url" content="https://glists.github.io/">
	<meta name="twitter:title" content="Glists — соцсеть без цензуры">
	<meta name="twitter:description" content="Посты, опросы, тёмная тема. Присоединяйся к Глистам!">
	<meta name="twitter:image" content="https://glists.github.io/android-chrome-512x512.png">
	<meta name="twitter:site" content="@glists">
	<meta name="twitter:creator" content="@normicchel">

	<!-- Для Telegram (использует Open Graph, но можно добавить специфическое) -->
	<meta property="telegram:channel" content="@glists">

	<!-- Для VK и OK достаточно Open Graph -->

	<!-- Pinterest (необязательно) -->
	<meta name="pinterest-rich-pin" content="false">

	<!-- Гео-теги (не обязательно, но для полноты) -->
	<meta name="geo.region" content="RU">
	<meta name="geo.placename" content="Москва">

	<!-- mobile web app (для iOS) -->
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="apple-mobile-web-app-title" content="Glists">

	<!-- MS Application -->
	<meta name="application-name" content="Glists">
	<meta name="msapplication-config" content="/browserconfig.xml"> <!-- создадим -->

	<!-- Theme color для браузеров (Chrome, Edge, Firefox) -->
	<meta name="theme-color" content="#1877f2">
    <title>🐛 Glists — уведомления</title>
    <style>
        :root { --bg-body: #f0f2f5; --bg-container: white; --text-primary: #1e2a3e; --border-color: #ddd; }
        body.dark { --bg-body: #1a1a2e; --bg-container: #16213e; --text-primary: #eee; --border-color: #2c3e50; }
        body { font-family: system-ui; background: var(--bg-body); margin: 0; padding: 20px; transition: background 0.2s; }
        .container { max-width: 600px; margin: auto; background: var(--bg-container); border-radius: 16px; padding: 20px; }
        .notification { padding: 12px; border-bottom: 1px solid var(--border-color); }
        .notification.unread { background: #e0f0ff; }
        body.dark .notification.unread { background: #0a2a4a; }
        .back-link { display: inline-block; margin-top: 20px; color: #1877f2; text-decoration: none; }
        .lang-toggle { background: #e4e6eb; border: none; border-radius: 20px; padding: 6px 12px; cursor: pointer; font-size: 0.9rem; margin-bottom: 15px; }
    </style>
	<script type="application/ld+json">
	{
	  "@context": "https://schema.org",
	  "@type": "SocialMediaPlatform",
	  "name": "Glists",
	  "alternateName": "Глисты",
	  "url": "https://glists.github.io",
	  "logo": "https://glists.github.io/android-chrome-512x512.png",
	  "sameAs": [
		"https://t.me/glists",
		"https://twitter.com/glists"
	  ],
	  "description": "Социальная сеть для общения, создания постов, опросов, обмена сообщениями. Тёмная тема, верификация через паспорт, никакой цензуры.",
	  "inLanguage": ["ru", "en"],
	  "potentialAction": {
		"@type": "JoinAction",
		"target": "https://glists.github.io"
	  }
	}
	</script>
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1 id="pageTitle">🔔 Уведомления</h1>
        <button class="lang-toggle" id="langToggle">🇷🇺 RU</button>
    </div>
    <div id="notificationsList">Загрузка...</div>
    <a href="/" class="back-link" id="backLink">← На главную</a>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, query, where, orderBy, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

	const firebaseConfig = {
		apiKey: "AIzaSyB_NKxMxFLg3gjgJqqJq_GsgAvvtz86mXA",
		authDomain: "myfirstsocialnetwork-1.firebaseapp.com",
		projectId: "myfirstsocialnetwork-1",
		storageBucket: "myfirstsocialnetwork-1.firebasestorage.app",
		messagingSenderId: "327472461874",
		appId: "1:327472461874:web:47729cf4fc8c732484e42b",
		measurementId: "G-K825X42BYP"
	};
	const app = initializeApp(firebaseConfig);  // ← исправлено
	const db = getFirestore(app);
	const auth = getAuth(app);

    // --- Загрузка переводов ---
    let translations = {};
    let currentLang = 'ru';
    
    function getUrlParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }
    
    async function loadTranslations(lang) {
        const response = await fetch(`/translations/${lang}.json`);
        if (!response.ok) throw new Error(`Failed to load ${lang} translations`);
        return await response.json();
    }
    
    function applyTranslations() {
        document.title = translations.site_title || "Glists";
        const pageTitle = document.getElementById('pageTitle');
        if (pageTitle) pageTitle.innerText = translations.notifications || "Уведомления";
        const backLink = document.getElementById('backLink');
        if (backLink) backLink.innerText = translations.back_home || "← На главную";
        const langToggle = document.getElementById('langToggle');
        if (langToggle) langToggle.innerText = currentLang === 'ru' ? translations.lang_ru : translations.lang_en;
    }
    
    // Инициализация языка
    const urlLang = getUrlParam('hl');
    if (urlLang && (urlLang === 'ru' || urlLang === 'en')) {
        currentLang = urlLang;
        localStorage.setItem('glists_lang', currentLang);
    } else {
        const savedLang = localStorage.getItem('glists_lang');
        if (savedLang && (savedLang === 'ru' || savedLang === 'en')) currentLang = savedLang;
    }
    
    try {
        translations = await loadTranslations(currentLang);
    } catch(e) { console.error(e); }
    applyTranslations();
    
    document.getElementById('langToggle').onclick = () => {
        const newLang = currentLang === 'ru' ? 'en' : 'ru';
        const url = new URL(window.location.href);
        url.searchParams.set('hl', newLang);
        window.location.href = url.toString();
    };
    
    // Тема
    if (localStorage.getItem('glists_theme') === 'dark') document.body.classList.add('dark');
    
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = '/'; return; }
        const q = query(collection(db, 'notifications'), where('uid', '==', user.uid), orderBy('createdAt', 'desc'));
        onSnapshot(q, (snap) => {
            const container = document.getElementById('notificationsList');
            container.innerHTML = '';
            snap.forEach(docSnap => {
                const n = docSnap.data();
                const isUnread = !n.read;
                const div = document.createElement('div');
                div.className = `notification ${isUnread ? 'unread' : ''}`;
                let text = '';
                switch (n.type) {
                    case 'like': text = translations.liked_your_post?.replace('{name}', n.fromName) || `${n.fromName} лайкнул ваш пост`; break;
                    case 'repost': text = translations.reposted_your_post?.replace('{name}', n.fromName) || `${n.fromName} репостнул ваш пост`; break;
                    case 'comment': text = translations.commented_your_post?.replace('{name}', n.fromName) || `${n.fromName} оставил комментарий`; break;
                    case 'mention': text = translations.mentioned_you?.replace('{name}', n.fromName) || `${n.fromName} упомянул вас`; break;
                    default: text = translations.notification_default || "Новое уведомление";
                }
                div.innerHTML = `<div>${text}</div><small>${new Date(n.createdAt.toDate()).toLocaleString()}</small>`;
                container.appendChild(div);
                if (isUnread) {
                    updateDoc(doc(db, 'notifications', docSnap.id), { read: true });
                }
            });
            if (snap.empty) container.innerHTML = `<p>${translations.no_notifications || "Уведомлений пока нет"}</p>`;
        });
    });
</script>
</body>
</html>
