<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Glists - Profile</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1 id="profileTitle">Профиль</h1>
        <button class="lang-toggle" id="langToggle">🇷🇺 RU</button>
    </div>
    <div id="root">Загрузка...</div>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs, orderBy, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const config = {
        apiKey: "AIzaSyCzqpQniq7LiwRZ_L_FKEsIXh6CfC76QHA",
        authDomain: "myfirstsocialnetwork-0.firebaseapp.com",
        projectId: "myfirstsocialnetwork-0",
        storageBucket: "myfirstsocialnetwork-0.firebasestorage.app",
        messagingSenderId: "557037045975",
        appId: "1:557037045975:web:dbcbd7ca0111a1494ac892"
    };
    const app = initializeApp(config);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // --- Переводы ---
    let translations = {};
    let currentLang = 'ru';
    
    function getUrlParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }
    
    async function loadTranslations(lang) {
        const response = await fetch(`/translations/${lang}.json`);
        if (!response.ok) throw new Error(`Failed to load ${lang} translations`);
        return await response.json();
    }
    
    function applyTranslations() {
        document.title = translations.site_title || "Glists";
        const profileTitle = document.getElementById('profileTitle');
        if (profileTitle) profileTitle.innerText = translations.profile || "Профиль";
        const langToggle = document.getElementById('langToggle');
        if (langToggle) langToggle.innerText = currentLang === 'ru' ? translations.lang_ru : translations.lang_en;
    }
    
    const urlLang = getUrlParam('hl');
    if (urlLang && (urlLang === 'ru' || urlLang === 'en')) {
        currentLang = urlLang;
        localStorage.setItem('glists_lang', currentLang);
    } else {
        const savedLang = localStorage.getItem('glists_lang');
        if (savedLang && (savedLang === 'ru' || savedLang === 'en')) currentLang = savedLang;
    }
    
    try {
        translations = await loadTranslations(currentLang);
    } catch(e) { console.error(e); }
    applyTranslations();
    
    document.getElementById('langToggle').onclick = () => {
        const newLang = currentLang === 'ru' ? 'en' : 'ru';
        const url = new URL(window.location.href);
        url.searchParams.set('hl', newLang);
        window.location.href = url.toString();
    };
    
    if (localStorage.getItem('glists_theme') === 'dark') document.body.classList.add('dark');
    
    const params = new URLSearchParams(location.search);
    const username = params.get('user');
    const verifiedSVG = `<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path fill="rgb(0, 149, 246)" d="M8.248 2.87a2.198 2.198 0 0 1 3.504 0c.48.633 1.264.958 2.05.85a2.198 2.198 0 0 1 2.478 2.477 2.2 2.2 0 0 0 .85 2.051 2.198 2.198 0 0 1 0 3.504 2.2 2.2 0 0 0-.85 2.05 2.198 2.198 0 0 1-2.477 2.478 2.2 2.2 0 0 0-2.051.85 2.198 2.198 0 0 1-3.504 0 2.2 2.2 0 0 0-2.05-.85 2.198 2.198 0 0 1-2.478-2.477 2.2 2.2 0 0 0-.85-2.051 2.198 2.198 0 0 1 0-3.504c.633-.48.958-1.264.85-2.05A2.198 2.198 0 0 1 6.197 3.72a2.2 2.2 0 0 0 2.051-.85"></path><path fill="#fff" fill-rule="evenodd" d="M13.765 7.205a.75.75 0 0 1 .03 1.06l-4.25 4.5a.75.75 0 0 1-1.047.042l-2.25-2.025A.75.75 0 0 1 7.25 9.667l1.706 1.536 3.748-3.968a.75.75 0 0 1 1.06-.03z" clip-rule="evenodd"></path></svg>`;

    let currentUser = null;
    onAuthStateChanged(auth, (user) => { currentUser = user; });

    if (!username) {
        document.getElementById('root').innerHTML = translations.no_recipient || 'Не указан пользователь';
    } else {
        const userRef = doc(db, 'users', username);
        const userSnap = await getDoc(userRef);
        if (!userSnap.exists()) {
            document.getElementById('root').innerHTML = `<p>${translations.user_not_found || 'Пользователь не найден'}</p><a href="/" class="back-link">${translations.back_home || '← На главную'}</a>`;
        } else {
            const data = userSnap.data();
            const displayName = data.displayName || username;
            const verified = data.verified === true;
            const avatarUrl = data.avatarUrl || '';
            const pinnedPostId = data.pinnedPostId || null;
            const isOwnProfile = (currentUser && currentUser.uid === data.uid);
            const blockedBy = data.blockedBy || [];
            const isBlocked = blockedBy.includes(currentUser?.uid);
            let blockedWarning = '';
            if (isBlocked && !isOwnProfile) blockedWarning = `<p style="color:red;">${translations.posts_hidden_blocked || 'Вы заблокировали этого пользователя. Его посты скрыты.'}</p>`;

            let postsHtml = '';
            if (!isBlocked || isOwnProfile) {
                const postsQuery = query(collection(db, 'posts'), where('uid', '==', data.uid), orderBy('createdAt', 'desc'));
                const postsSnap = await getDocs(postsQuery);
                let pinnedPostHtml = '';
                let normalPostsHtml = '';
                postsSnap.forEach(docSnap => {
                    const p = docSnap.data();
                    const postId = docSnap.id;
                    const date = p.createdAt ? new Date(p.createdAt.toDate()).toLocaleString() : '';
                    const postHtml = `<div class="post"><div>${date}</div><div>${escapeHtml(p.text)}</div>${p.imageUrl ? `<img src="${escapeHtml(p.imageUrl)}" style="max-width:100%;border-radius:8px;margin-top:5px;">` : ''}</div>`;
                    if (pinnedPostId === postId) pinnedPostHtml = `<div><strong>${translations.pinned_badge || '📌 Закреплённый пост'}</strong>${postHtml}</div>`;
                    else normalPostsHtml += postHtml;
                });
                postsHtml = (pinnedPostHtml ? pinnedPostHtml : '') + (normalPostsHtml || `<p>${translations.no_posts || 'Нет постов'}</p>`);
            } else {
                postsHtml = `<p>${translations.posts_hidden_blocked || 'Посты скрыты из-за блокировки.'}</p>`;
            }

            const editButton = isOwnProfile ? `<div><a href="/edit-profile.html" style="display:inline-block; background:#1877f2; color:white; padding:8px 16px; border-radius:20px; text-decoration:none;">${translations.edit_profile || '✏️ Редактировать профиль'}</a></div>` : '';
            const messageButton = (!isOwnProfile && currentUser) ? `<button class="message-btn" data-username="${username}">${translations.message || '💬 Сообщение'}</button>` : '';
            const blockButton = (!isOwnProfile && currentUser && !isBlocked) ? `<button class="block-btn" data-username="${username}">${translations.block || '🚫 Заблокировать'}</button>` : '';

            const verifiedBadge = verified ? `<div class="verified-wrapper"><span class="verified-icon">${verifiedSVG}</span><span class="verified-tooltip">${translations.verified_tooltip || 'Верифицированный пользователь'}</span></div>` : '';

            document.getElementById('root').innerHTML = `
                <div style="display:flex; gap:20px; align-items:center; flex-wrap:wrap;">
                    <div class="avatar">
                        ${avatarUrl ? `<img src="${escapeHtml(avatarUrl)}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">` : `<div style="width:80px;height:80px;border-radius:50%;background:#1877f2;display:flex;align-items:center;justify-content:center;font-size:2rem;">${displayName.charAt(0).toUpperCase()}</div>`}
                    </div>
                    <div>
                        <h1>${escapeHtml(displayName)} ${verifiedBadge}</h1>
                        <p>@${escapeHtml(username)}</p>
                        <p>${escapeHtml(data.bio || '')}</p>
                        ${editButton}
                        ${messageButton}
                        ${blockButton}
                    </div>
                </div>
                ${blockedWarning}
                <h3>${translations.posts || 'Посты'}</h3>
                ${postsHtml}
                <a href="/" class="back-link">${translations.back_home || '← На главную'}</a>
            `;

            if (messageButton) {
                document.querySelector('.message-btn')?.addEventListener('click', () => {
                    window.location.href = `/messages.html?user=${username}&hl=${currentLang}`;
                });
            }
            if (blockButton) {
                document.querySelector('.block-btn')?.addEventListener('click', async () => {
                    if (confirm(translations.block_user_confirm?.replace('{username}', username) || `Заблокировать @${username}?`)) {
                        const blockedUserRef = doc(db, 'users', username);
                        await updateDoc(blockedUserRef, { blockedBy: arrayUnion(currentUser.uid) });
                        alert(translations.block_success || "Пользователь заблокирован. Страница обновится.");
                        location.reload();
                    }
                });
            }
        }
    }
    function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => m == '&' ? '&amp;' : m == '<' ? '&lt;' : '&gt;') : ''; }
</script>
</body>
</html>
