<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль Glists</title>
    <style>
        :root { --bg-body: #f0f2f5; --bg-container: white; --text-primary: #1e2a3e; --text-secondary: #555; --border-color: #ddd; --post-bg: #f8f9fa; }
        body.dark { --bg-body: #1a1a2e; --bg-container: #16213e; --text-primary: #eee; --text-secondary: #aaa; --border-color: #2c3e50; --post-bg: #0f3460; }
        body { font-family: system-ui; background: var(--bg-body); margin: 0; padding: 20px; transition: background 0.2s; }
        .container { max-width: 600px; margin: auto; background: var(--bg-container); border-radius: 16px; padding: 20px; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; background: #1877f2; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; }
        .post { border-left: 4px solid #1877f2; margin: 10px 0; padding: 10px; background: var(--post-bg); border-radius: 8px; }
        .verified-icon { display: inline-flex; margin-left: 4px; vertical-align: middle; }
        .back-link { display: inline-block; margin-top: 20px; color: #1877f2; text-decoration: none; }
        .message-btn, .block-btn { background: #6c757d; color: white; border: none; border-radius: 20px; padding: 6px 12px; cursor: pointer; font-size: 0.8rem; margin-left: 8px; }
        .pinned-badge { background: #28a745; color: white; border-radius: 12px; padding: 2px 8px; font-size: 0.7rem; display: inline-block; margin-left: 8px; }
        .verified-wrapper { display: inline-flex; position: relative; cursor: pointer; }
        .verified-tooltip { position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%) translateY(8px); background: rgba(0,0,0,0.85); color: white; font-size: 0.75rem; padding: 6px 10px; border-radius: 8px; white-space: nowrap; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; }
        .verified-wrapper:hover .verified-tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
<div class="container" id="root">Загрузка...</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs, orderBy, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const config = {
        apiKey: "AIzaSyCzqpQniq7LiwRZ_L_FKEsIXh6CfC76QHA",
        authDomain: "myfirstsocialnetwork-0.firebaseapp.com",
        projectId: "myfirstsocialnetwork-0",
        storageBucket: "myfirstsocialnetwork-0.firebasestorage.app",
        messagingSenderId: "557037045975",
        appId: "1:557037045975:web:dbcbd7ca0111a1494ac892"
    };
    const app = initializeApp(config);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const params = new URLSearchParams(location.search);
    const username = params.get('user');
    const verifiedSVG = `<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path fill="rgb(0, 149, 246)" d="M8.248 2.87a2.198 2.198 0 0 1 3.504 0c.48.633 1.264.958 2.05.85a2.198 2.198 0 0 1 2.478 2.477 2.2 2.2 0 0 0 .85 2.051 2.198 2.198 0 0 1 0 3.504 2.2 2.2 0 0 0-.85 2.05 2.198 2.198 0 0 1-2.477 2.478 2.2 2.2 0 0 0-2.051.85 2.198 2.198 0 0 1-3.504 0 2.2 2.2 0 0 0-2.05-.85 2.198 2.198 0 0 1-2.478-2.477 2.2 2.2 0 0 0-.85-2.051 2.198 2.198 0 0 1 0-3.504c.633-.48.958-1.264.85-2.05A2.198 2.198 0 0 1 6.197 3.72a2.2 2.2 0 0 0 2.051-.85"></path><path fill="#fff" fill-rule="evenodd" d="M13.765 7.205a.75.75 0 0 1 .03 1.06l-4.25 4.5a.75.75 0 0 1-1.047.042l-2.25-2.025A.75.75 0 0 1 7.25 9.667l1.706 1.536 3.748-3.968a.75.75 0 0 1 1.06-.03z" clip-rule="evenodd"></path></svg>`;

    let currentUser = null;
    onAuthStateChanged(auth, (user) => { currentUser = user; });

    if (!username) {
        document.getElementById('root').innerHTML = 'Не указан пользователь';
    } else {
        const userRef = doc(db, 'users', username);
        const userSnap = await getDoc(userRef);
        if (!userSnap.exists()) {
            document.getElementById('root').innerHTML = `<p>Пользователь @${username} не найден</p><a href="/" class="back-link">← На главную</a>`;
        } else {
            const data = userSnap.data();
            const displayName = data.displayName || username;
            const verified = data.verified === true;
            const avatarUrl = data.avatarUrl || '';
            const pinnedPostId = data.pinnedPostId || null;
            const isOwnProfile = (currentUser && currentUser.uid === data.uid);
            const blockedBy = data.blockedBy || [];
            const isBlocked = blockedBy.includes(currentUser?.uid);
            let blockedWarning = '';
            if (isBlocked && !isOwnProfile) blockedWarning = '<p style="color:red;">Вы заблокировали этого пользователя. Его посты скрыты.</p>';

            let postsHtml = '';
            if (!isBlocked || isOwnProfile) {
                const postsQuery = query(collection(db, 'posts'), where('uid', '==', data.uid), orderBy('createdAt', 'desc'));
                const postsSnap = await getDocs(postsQuery);
                let pinnedPostHtml = '';
                let normalPostsHtml = '';
                postsSnap.forEach(docSnap => {
                    const p = docSnap.data();
                    const postId = docSnap.id;
                    const date = p.createdAt ? new Date(p.createdAt.toDate()).toLocaleString() : '';
                    const postHtml = `<div class="post"><div>${date}</div><div>${escapeHtml(p.text)}</div>${p.imageUrl ? `<img src="${escapeHtml(p.imageUrl)}" style="max-width:100%;border-radius:8px;margin-top:5px;">` : ''}</div>`;
                    if (pinnedPostId === postId) pinnedPostHtml = `<div><strong>📌 Закреплённый пост</strong>${postHtml}</div>`;
                    else normalPostsHtml += postHtml;
                });
                postsHtml = (pinnedPostHtml ? pinnedPostHtml : '') + (normalPostsHtml || '<p>Нет постов</p>');
            } else {
                postsHtml = '<p>Посты скрыты из-за блокировки.</p>';
            }

            const editButton = isOwnProfile ? `<div><a href="/edit-profile.html" style="display:inline-block; background:#1877f2; color:white; padding:8px 16px; border-radius:20px; text-decoration:none;">✏️ Редактировать профиль</a></div>` : '';
            const messageButton = (!isOwnProfile && currentUser) ? `<button class="message-btn" data-username="${username}">💬 Сообщение</button>` : '';
            const blockButton = (!isOwnProfile && currentUser && !isBlocked) ? `<button class="block-btn" data-username="${username}">🚫 Заблокировать</button>` : '';

            const verifiedBadge = verified ? `<div class="verified-wrapper"><span class="verified-icon">${verifiedSVG}</span><span class="verified-tooltip">Верифицированный пользователь</span></div>` : '';

            document.getElementById('root').innerHTML = `
                <div style="display:flex; gap:20px; align-items:center; flex-wrap:wrap;">
                    <div class="avatar">
                        ${avatarUrl ? `<img src="${escapeHtml(avatarUrl)}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">` : `<div style="width:80px;height:80px;border-radius:50%;background:#1877f2;display:flex;align-items:center;justify-content:center;font-size:2rem;">${displayName.charAt(0).toUpperCase()}</div>`}
                    </div>
                    <div>
                        <h1>${escapeHtml(displayName)} ${verifiedBadge}</h1>
                        <p>@${escapeHtml(username)}</p>
                        <p>${escapeHtml(data.bio || '')}</p>
                        ${editButton}
                        ${messageButton}
                        ${blockButton}
                    </div>
                </div>
                ${blockedWarning}
                <h3>Посты</h3>
                ${postsHtml}
                <a href="/" class="back-link">← На главную</a>
            `;

            if (messageButton) {
                document.querySelector('.message-btn')?.addEventListener('click', () => {
                    window.location.href = `/messages.html?user=${username}`;
                });
            }
            if (blockButton) {
                document.querySelector('.block-btn')?.addEventListener('click', async () => {
                    if (confirm(`Заблокировать @${username}?`)) {
                        const blockedUserRef = doc(db, 'users', username);
                        await updateDoc(blockedUserRef, { blockedBy: arrayUnion(currentUser.uid) });
                        alert("Пользователь заблокирован. Страница обновится.");
                        location.reload();
                    }
                });
            }
        }
    }
    function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => m == '&' ? '&amp;' : m == '<' ? '&lt;' : '&gt;') : ''; }
    if (localStorage.getItem('glists_theme') === 'dark') document.body.classList.add('dark');
</script>
</body>
</html>
